<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Work Impact Tracker (Synced)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f4; padding-bottom: 100px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #15803d; cursor: pointer; margin-top: -7px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e7e5e4; border-radius: 3px; }
        .syncing { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-stone-300 pb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold text-stone-800 tracking-tight">Impact & KPI Tracker</h1>
                <p id="status" class="text-stone-500 text-xs font-bold uppercase tracking-widest">● Local Mode</p>
            </div>
            <button onclick="exportToCSV()" class="bg-stone-800 text-white text-[10px] font-black px-4 py-2 rounded hover:bg-stone-700 transition uppercase tracking-widest">Download Report</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border-t-4 border-green-700 h-fit">
                <h2 class="text-xl font-bold mb-4 text-stone-800">Log Engagement</h2>
                <form id="logForm" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-stone-500">Date</label>
                            <input type="date" id="date" required class="w-full p-2 border rounded mt-1 text-sm focus:ring-2 focus:ring-green-600 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase text-stone-500 text-right">Hours</label>
                            <input type="number" id="hours" step="0.5" placeholder="1.5" required class="w-full p-2 border rounded mt-1 text-sm focus:ring-2 focus:ring-green-600 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-stone-500">Primary Outcome</label>
                        <select id="kpi" class="w-full p-2 border rounded mt-1 text-sm font-medium bg-stone-50">
                            <option value="Rapport Building">Rapport Building</option>
                            <option value="Attendance Support">Attendance Support</option>
                            <option value="Conflict Resolution">Conflict Resolution</option>
                            <option value="Skills Building">Skills Building</option>
                            <option value="Mental Health Support">Mental Health Support</option>
                            <option value="Crisis Intervention">Crisis Intervention</option>
                        </select>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-[10px] font-black uppercase text-stone-500">Impact Intensity</label>
                            <span id="impactBadge" class="text-[10px] font-bold px-2 py-0.5 rounded bg-green-100 text-green-800">Level 1</span>
                        </div>
                        <input type="range" id="impact" min="1" max="5" value="1" step="1" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-green-700">
                        <div class="mt-3 p-3 bg-stone-50 border rounded text-center">
                            <p id="impactTitle" class="text-xs font-bold text-green-900 mb-1">Level 1: Baseline Rapport</p>
                            <p id="impactDesc" class="text-[10px] text-stone-500 italic">Initial connection and foundation building.</p>
                        </div>
                    </div>
                    <textarea id="notes" class="w-full p-2 border rounded h-24 text-sm focus:ring-2 focus:ring-green-600 outline-none" placeholder="Evidence Notes..."></textarea>
                    <button type="submit" class="w-full bg-green-700 text-white font-bold py-3 rounded hover:bg-green-800 transition shadow-lg">Save & Sync</button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-green-600">
                        <p class="text-stone-400 text-[10px] font-black uppercase">Term Hours</p>
                        <p id="totalHours" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-red-600">
                        <p class="text-stone-400 text-[10px] font-black uppercase">Critical (Lvl 4-5)</p>
                        <p id="totalHighImpact" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-blue-500">
                        <p class="text-stone-400 text-[10px] font-black uppercase">Total Logs</p>
                        <p id="totalLogs" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                </div>
                <div id="logList" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="text-center md:text-left">
                    <h2 class="text-[9px] font-black uppercase text-stone-400 tracking-widest">Term Milestone</h2>
                    <p class="text-lg font-black text-stone-800"><span id="displayPercent">0</span>% <span class="text-xs font-normal text-stone-400 italic">Target: 100 Hrs</span></p>
                </div>
                <div class="flex-1 w-full md:max-w-xl">
                    <div class="w-full bg-stone-100 h-3 rounded-full overflow-hidden border border-stone-200">
                        <div id="progressBar" class="bg-green-600 h-full transition-all duration-700 ease-out" style="width: 0%"></div>
                    </div>
                </div>
                <p class="text-xs font-bold text-green-800" id="hoursRemainingText">100 hours to go</p>
            </div>
        </div>
    </div>

    <script>
        // PASTE YOUR GOOGLE WEB APP URL HERE
        const SCRIPT_URL = https://script.google.com/macros/s/AKfycbwj71nSiF0qO6JxDgslWgK7EtBOMG4GxFAg6T1NX6IvV9zUpzysZ4Gxq_mutQ5td1WeTQ/exec;
        const TERM_GOAL = 100;
        
        let logs = JSON.parse(localStorage.getItem('youthWorkImpact_Synced')) || [];
        const impactInfo = {
            1: { title: "Level 1: Baseline Rapport", desc: "Initial connection and foundation building.", color: "bg-stone-200 text-stone-700" },
            2: { title: "Level 2: Trust Building", desc: "Consistent engagement and sharing.", color: "bg-green-100 text-green-800" },
            3: { title: "Level 3: Focused Growth", desc: "Working on skills or personal goals.", color: "bg-blue-600 text-white" },
            4: { title: "Level 4: Major Breakthrough", desc: "Significant positive shift in attitude.", color: "bg-orange-600 text-white" },
            5: { title: "Level 5: Critical Success", desc: "Crisis de-escalation/Incident prevention.", color: "bg-red-700 text-white" }
        };

        const statusEl = document.getElementById('status');

        async function syncToGoogle() {
            if (SCRIPT_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") return;
            statusEl.innerText = "● Syncing to Google Sheets...";
            statusEl.classList.add('syncing', 'text-blue-600');
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(logs)
                });
                statusEl.innerText = "● All data synced to Google Sheets";
                statusEl.classList.remove('syncing', 'text-blue-600');
                statusEl.classList.add('text-green-600');
            } catch (e) {
                statusEl.innerText = "● Sync Error - Saved Locally";
                statusEl.classList.remove('syncing');
                statusEl.classList.add('text-red-600');
            }
        }

        async function loadFromGoogle() {
            if (SCRIPT_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") return;
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                if (data && data.length > 0) {
                    logs = data;
                    updateUI(false); // Update UI without triggering another save
                }
            } catch (e) { console.log("Cloud load failed, using local."); }
        }

        function updateUI(shouldSync = true) {
            localStorage.setItem('youthWorkImpact_Synced', JSON.stringify(logs));
            
            const totalHours = logs.reduce((sum, log) => sum + parseFloat(log.hours), 0);
            const highImpact = logs.filter(log => parseInt(log.impact) >= 4).length;
            const percentage = Math.min((totalHours / TERM_GOAL) * 100, 100);
            const remaining = Math.max(TERM_GOAL - totalHours, 0);

            document.getElementById('totalHours').innerText = totalHours;
            document.getElementById('totalHighImpact').innerText = highImpact;
            document.getElementById('totalLogs').innerText = logs.length;
            document.getElementById('displayPercent').innerText = percentage.toFixed(0);
            document.getElementById('progressBar').style.width = `${percentage}%`;
            document.getElementById('hoursRemainingText').innerText = remaining > 0 ? `${remaining} hours to go` : "Goal Achieved! 🏆";

            const list = document.getElementById('logList');
            list.innerHTML = logs.map((log, index) => {
                const info = impactInfo[log.impact];
                return `
                <div class="flex gap-4 p-4 rounded-lg bg-white border border-stone-100 shadow-sm">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-green-900 text-sm tracking-tight">${log.kpi}</h4>
                            <span class="text-[8px] font-black px-2 py-1 rounded ${info.color}">${info.title.split(':')[1].toUpperCase()}</span>
                        </div>
                        <div class="text-[10px] font-bold text-stone-400 mt-1 uppercase">${log.date} • ${log.hours} Hours</div>
                        <p class="text-xs text-stone-700 mt-2 p-2 bg-stone-50 rounded border-l-2 border-stone-200 italic">"${log.notes || 'No notes.'}"</p>
                        <button onclick="deleteLog(${index})" class="text-[9px] text-stone-300 mt-2 hover:text-red-500 font-bold uppercase transition">Remove</button>
                    </div>
                </div>`;
            }).join('');

            if (shouldSync) syncToGoogle();
        }

        document.getElementById('logForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const log = {
                date: document.getElementById('date').value,
                hours: document.getElementById('hours').value,
                kpi: document.getElementById('kpi').value,
                impact: document.getElementById('impact').value,
                notes: document.getElementById('notes').value
            };
            logs.unshift(log);
            document.getElementById('logForm').reset();
            updateUI();
        });

        // Slider and UI listeners
        document.getElementById('impact').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('impactTitle').innerText = impactInfo[val].title;
            document.getElementById('impactDesc').innerText = impactInfo[val].desc;
            document.getElementById('impactBadge').innerText = `Level ${val}`;
        });

        function deleteLog(index) { if(confirm("Delete entry?")) { logs.splice(index, 1); updateUI(); } }
        
        // Load initial data
        loadFromGoogle();
        updateUI(false);
    </script>
</body>
</html>

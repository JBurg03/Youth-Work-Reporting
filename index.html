<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Work Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-stone-100 font-sans">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h1 class="text-2xl font-black text-stone-800">Master Impact Log</h1>
                <p id="status" class="text-[10px] font-bold uppercase text-stone-400">● Device Ready</p>
            </div>
            <button onclick="fullSync()" class="bg-blue-600 text-white text-xs font-black px-6 py-3 rounded-xl shadow-lg uppercase hover:bg-blue-700 transition active:scale-95">
                Sync Master List
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm h-fit">
                <form id="logForm" class="space-y-4">
                    <input type="date" id="date" required class="w-full p-3 bg-stone-50 border rounded-xl text-sm">
                    <input type="number" id="hours" step="0.5" placeholder="Hours (e.g. 1.5)" required class="w-full p-3 bg-stone-50 border rounded-xl text-sm">
                    
                    <select id="relationalType" class="w-full p-3 bg-stone-50 border rounded-xl text-sm">
                        <option value="One-on-One">One-on-One</option>
                        <option value="Group Session">Group Session</option>
                        <option value="Event/Bush Work">Event/Bush Work</option>
                        <option value="Prep/Admin">Prep/Admin</option>
                    </select>

                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="attendance" value="1" placeholder="Attending" class="p-3 bg-stone-50 border rounded-xl text-sm">
                        <input type="text" id="target" placeholder="Location/Name" required class="p-3 bg-stone-50 border rounded-xl text-sm">
                    </div>

                    <input list="kpi-options" id="kpi" placeholder="Outcome/KPI" required class="w-full p-3 bg-stone-50 border rounded-xl text-sm">
                    <datalist id="kpi-options">
                        <option value="Rapport Building"><option value="Mentoring"><option value="Crisis Support">
                    </datalist>

                    <textarea id="notes" placeholder="Notes..." class="w-full p-3 bg-stone-50 border rounded-xl text-sm h-24"></textarea>
                    
                    <input type="hidden" id="impact" value="3">

                    <button type="submit" class="w-full bg-stone-900 text-white font-bold py-4 rounded-xl text-xs uppercase tracking-widest hover:bg-black transition">
                        Add to Queue
                    </button>
                </form>
            </section>

            <section class="lg:col-span-2 space-y-4">
                <h2 class="text-[10px] font-black uppercase text-stone-400 tracking-widest ml-2">Displaying Master Sheet Data</h2>
                <div id="logList" class="space-y-3 overflow-y-auto max-h-[700px] pr-2">
                    <p class="text-stone-400 italic text-sm text-center py-20">Hit Sync to pull all logs from the spreadsheet...</p>
                </div>
            </section>
        </div>
    </div>

    <script>
        // PASTE YOUR NEW DEPLOYMENT URL HERE
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFAyYpnEkj6KACc1uNRlrM4gb-06M5imZEEcTIvD6QQ9qR1BclrQYnovnZnsJqK5Db9Q/exec"; 
        
        let logs = JSON.parse(localStorage.getItem('youth_master_v7')) || [];

        function updateUI() {
            localStorage.setItem('youth_master_v7', JSON.stringify(logs));
            const list = document.getElementById('logList');

            if (logs.length === 0) {
                list.innerHTML = `<p class="text-stone-400 italic text-sm text-center py-20">No logs found. Sync to fetch history.</p>`;
                return;
            }

            // Sort logs by date (newest first)
            const sortedLogs = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));

            list.innerHTML = sortedLogs.map((log) => `
                <div class="bg-white p-5 rounded-2xl border border-stone-200 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black text-stone-400 uppercase">${new Date(log.date).toLocaleDateString('en-NZ')}</span>
                        <span class="text-[10px] font-black bg-stone-100 px-3 py-1 rounded-full">${log.hours}h</span>
                    </div>
                    <h4 class="font-bold text-stone-800">${log.kpi}</h4>
                    <p class="text-xs text-stone-500 italic mt-1">"${log.notes}"</p>
                    <div class="mt-3 flex gap-2">
                        <span class="text-[8px] font-bold px-2 py-0.5 rounded bg-blue-50 text-blue-600 border border-blue-100 uppercase">${log.relationalType}</span>
                        <span class="text-[8px] font-bold px-2 py-0.5 rounded bg-stone-100 text-stone-500 uppercase">${log.target}</span>
                    </div>
                </div>
            `).join('');
        }

        async function fullSync() {
            const status = document.getElementById('status');
            status.innerText = "● Connecting to Google...";
            
            try {
                // 1. Send local data
                if(logs.length > 0) {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ data: logs })
                    });
                }

                // 2. Clear and Pull everything back
                const response = await fetch(SCRIPT_URL);
                const masterData = await response.json();
                
                // 3. Update the app with ONLY what is on the sheet
                logs = masterData;
                updateUI();
                
                status.innerText = "● Master Sync Success";
            } catch (err) {
                status.innerText = "● Error: Check Script URL";
                console.error(err);
            }
        }

        document.getElementById('logForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const log = {
                date: document.getElementById('date').value,
                hours: document.getElementById('hours').value,
                relationalType: document.getElementById('relationalType').value,
                attendance: document.getElementById('attendance').value,
                target: document.getElementById('target').value,
                kpi: document.getElementById('kpi').value,
                notes: document.getElementById('notes').value,
                impact: document.getElementById('impact').value
            };
            logs.unshift(log);
            updateUI();
            e.target.reset();
            // Trigger sync automatically
            fullSync();
        });

        // Initialize
        updateUI();
    </script>
</body>
</html>

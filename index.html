<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youth Work Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { background-color: #f5f5f4; padding-bottom: 140px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #15803d; cursor: pointer; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.1); margin-top: -6px; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e7e5e4; border-radius: 3px; }
    .edit-mode { border: 2px solid #3b82f6 !important; background-color: #eff6ff !important; }
    .hidden { display: none; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div id="app" class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-6">
    <header class="flex justify-between items-center border-b pb-4 mb-4">
      <h1 class="text-2xl font-bold text-stone-800">Impact Tracker</h1>
      <div id="userInfo" class="text-xs text-stone-500 text-right"></div>
    </header>

    <div id="signedOut" class="flex flex-col items-center py-20">
      <div id="g_id_onload" data-client_id="598357137191-04lp6pqg2ehjhagg87kc5ggeaub2erpc.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="signedIn" class="hidden">
      <nav class="flex gap-6 mb-6 border-b text-sm font-bold text-stone-400">
        <button id="navLogs" onclick="go('logs')" class="pb-2 text-stone-800 border-b-2 border-stone-800">LOGS</button>
        <button id="navAdmin" onclick="go('admin')" class="pb-2 hidden admin-only">ADMIN</button>
        <button id="navDropdowns" onclick="go('dropdowns')" class="pb-2 hidden admin-only">DROPDOWNS</button>
      </nav>

      <div id="pageLogs" class="page-view">
        <form id="logForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-stone-50 p-4 rounded border">
          <input type="hidden" id="editId">
          <input type="date" id="date" class="border p-2 rounded w-full" required>
          <select id="relationalType" class="border p-2 rounded w-full" required></select>
          <input type="text" id="target" placeholder="Target Name" class="border p-2 rounded w-full">
          <select id="kpi" class="border p-2 rounded w-full" required></select>
          <input type="number" id="hours" placeholder="Hours" step="0.5" class="border p-2 rounded w-full">
          <div class="md:col-span-2">
            <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">Impact Score (1-10)</label>
            <input type="range" id="impact" min="1" max="10" step="1" value="5" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer">
          </div>
          <textarea id="notes" placeholder="Notes..." class="border p-2 rounded md:col-span-2 w-full"></textarea>
          <button type="submit" id="saveBtn" class="bg-green-700 text-white font-bold py-2 px-4 rounded md:col-span-2">Save Engagement</button>
        </form>
        <div id="logList" class="space-y-3"></div>
      </div>

      <div id="pageDropdowns" class="page-view hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold mb-1">RELATIONAL TYPES (Line by line)</label>
            <textarea id="editRelTypes" class="w-full h-40 border p-2 rounded font-mono text-sm"></textarea>
          </div>
          <div>
            <label class="block text-xs font-bold mb-1">KPI OUTCOMES (Line by line)</label>
            <textarea id="editKpis" class="w-full h-40 border p-2 rounded font-mono text-sm"></textarea>
          </div>
        </div>
        <button onclick="saveDropdownSettings()" class="mt-4 bg-blue-700 text-white px-4 py-2 rounded font-bold">Save Dropdowns</button>
      </div>

      <div id="pageAdmin" class="page-view hidden">
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-bold mb-1">ADMINS (CSV)</label>
            <input type="text" id="adminCsv" class="w-full border p-2 rounded">
          </div>
          <div>
            <label class="block text-xs font-bold mb-1">VIEWERS (CSV)</label>
            <input type="text" id="viewerCsv" class="w-full border p-2 rounded">
          </div>
          <button onclick="saveAdminSettings()" class="bg-stone-800 text-white px-4 py-2 rounded font-bold">Update Permissions</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let authToken = "";
    let userRole = "";

    function go(page) {
      document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
      document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.remove('hidden');
      if (page === 'dropdowns') loadDropdownSettings();
    }

    async function handleCredentialResponse(response) {
      authToken = response.credential;
      document.getElementById("signedOut").classList.add("hidden");
      document.getElementById("signedIn").classList.remove("hidden");
      const res = await apiCall({ action: "me" });
      userRole = res.role;
      document.getElementById("userInfo").innerText = `${res.email}\n${res.role}`;
      if (userRole === "admin") document.querySelectorAll('.admin-only').forEach(e => e.classList.remove('hidden'));
      await refreshDropdowns();
      await loadLogs();
    }

    async function apiCall(payload) {
      return new Promise((resolve) => {
        google.script.run.withSuccessHandler(res => resolve(JSON.parse(res))).api({ token: authToken, payload: payload });
      });
    }

    async function refreshDropdowns() {
      const res = await apiCall({ action: "dropdowns_get" });
      if (res.ok) {
        fillSelect("relationalType", res.options.relationalTypes);
        fillSelect("kpi", res.options.kpis);
      }
    }

    function fillSelect(id, list) {
      const el = document.getElementById(id);
      el.innerHTML = '<option value="" disabled selected>Select...</option>';
      list.forEach(i => { const o = document.createElement("option"); o.value = o.textContent = i; el.appendChild(o); });
    }

    async function loadLogs() {
      const res = await apiCall({ action: "list" });
      const list = document.getElementById("logList");
      list.innerHTML = res.ok ? res.data.map(log => `
        <div class="p-3 border rounded bg-white flex justify-between items-center shadow-sm">
          <div>
            <div class="text-xs font-bold text-stone-400">${log.date}</div>
            <div class="text-sm font-bold">${log.target}</div>
            <div class="text-xs text-stone-500">${log.relationalType} | ${log.kpi} | ${log.hours}h</div>
          </div>
          ${userRole === 'admin' ? `<button onclick='editEntry(${JSON.stringify(log)})' class="text-blue-600 text-xs font-bold">EDIT</button>` : ''}
        </div>
      `).join('') : "";
    }

    function editEntry(log) {
      document.getElementById('editId').value = log.id;
      document.getElementById('date').value = log.date;
      document.getElementById('relationalType').value = log.relationalType;
      document.getElementById('target').value = log.target;
      document.getElementById('kpi').value = log.kpi;
      document.getElementById('hours').value = log.hours;
      document.getElementById('impact').value = log.impact;
      document.getElementById('notes').value = log.notes;
      document.getElementById('logForm').classList.add('edit-mode');
      window.scrollTo(0,0);
    }

    document.getElementById('logForm').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const data = {
        id: id || Date.now().toString(),
        date: document.getElementById('date').value,
        relationalType: document.getElementById('relationalType').value,
        target: document.getElementById('target').value,
        kpi: document.getElementById('kpi').value,
        hours: document.getElementById('hours').value,
        impact: document.getElementById('impact').value,
        notes: document.getElementById('notes').value
      };
      await apiCall({ action: id ? "edit" : "add", data: data });
      document.getElementById('logForm').reset();
      document.getElementById('editId').value = "";
      document.getElementById('logForm').classList.remove('edit-mode');
      loadLogs();
    };

    async function loadDropdownSettings() {
      const res = await apiCall({ action: "dropdowns_get" });
      if (res.ok) {
        document.getElementById('editRelTypes').value = res.options.relationalTypes.join("\n");
        document.getElementById('editKpis').value = res.options.kpis.join("\n");
      }
    }

    async function saveDropdownSettings() {
      const options = {
        relationalTypes: document.getElementById('editRelTypes').value.split('\n').filter(s => s.trim()),
        kpis: document.getElementById('editKpis').value.split('\n').filter(s => s.trim())
      };
      await apiCall({ action: "dropdowns_set", options: options });
      refreshDropdowns();
      go('logs');
    }

    async function saveAdminSettings() {
      const admins = {}; document.getElementById('adminCsv').value.split(',').forEach(e => { if(e.trim()) admins[e.trim().toLowerCase()] = true; });
      const viewers = {}; document.getElementById('viewerCsv').value.split(',').forEach(e => { if(e.trim()) viewers[e.trim().toLowerCase()] = true; });
      await apiCall({ action: "admin_set", admins, viewers });
      alert("Updated");
    }
  </script>
</body>
</html>

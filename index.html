<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youth Work Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #f5f5f4; padding-bottom: 140px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #15803d; cursor: pointer; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.1); margin-top: -6px; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e7e5e4; border-radius: 3px; }
    .syncing { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .edit-mode { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
    .chip { border-radius: 9999px; padding: 0.25rem 0.5rem; font-weight: 800; font-size: 9px; letter-spacing: .06em; text-transform: uppercase; }
    .btn-disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
  </style>
</head>
<body class="p-4 md:p-8 font-sans text-stone-900">
  <div class="max-w-6xl mx-auto">
    <header class="mb-8 border-b border-stone-300 pb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Impact Tracker</h1>
        <p id="status" class="text-stone-500 text-[10px] font-black uppercase tracking-widest mt-1">● Master Sheet Only Mode</p>
        <p id="lastUpdated" class="text-stone-500 text-[10px] font-black uppercase tracking-widest mt-1" style="display:none;"></p>
      </div>
      <button id="refreshBtn" onclick="fullSync()"
        class="bg-blue-600 text-white text-[10px] font-black px-6 py-3 rounded-xl hover:bg-blue-700 transition uppercase tracking-widest shadow-lg active:scale-95">
        Refresh Data
      </button>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div id="formContainer" class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border-t-4 border-green-700 h-fit transition-all duration-300">
        <h2 id="formTitle" class="text-xl font-bold mb-4 tracking-tight text-center">New Engagement</h2>

        <div id="editModeBanner" class="hidden mb-3">
          <div class="chip bg-blue-50 text-blue-700 border border-blue-100">Editing: <span id="editingIdText" class="font-black"></span></div>
        </div>

        <div id="formError" class="hidden mb-3 p-3 rounded-xl border border-red-200 bg-red-50 text-red-800 text-sm"></div>

        <form id="logForm" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[9px] font-black uppercase text-stone-400">Date</label>
              <input type="date" id="date" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50">
            </div>
            <div>
              <label class="block text-[9px] font-black uppercase text-stone-400 text-right">Hours</label>
              <input type="number" id="hours" step="0.5" min="0" placeholder="1.0" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50 text-right">
            </div>
          </div>

          <div>
            <label class="block text-[9px] font-black uppercase text-stone-400">Relational Type</label>
            <select id="relationalType" required class="w-full p-2 rounded-lg mt-1 text-sm bg-stone-50 border cursor-pointer">
              <option value="" disabled selected>Select Type...</option>
              <option value="One-on-One">One-on-One</option>
              <option value="Group Session">Group Session</option>
              <option value="Event/Bush Work">Event/Bush Work</option>
              <option value="Prep & Admin">Prep & Admin</option>
            </select>
          </div>

          <div class="grid grid-cols-3 gap-4">
            <div class="col-span-1">
              <label class="block text-[9px] font-black uppercase text-stone-400">Attend.</label>
              <input type="number" id="attendance" min="1" value="1" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50">
            </div>
            <div class="col-span-2">
              <label class="block text-[9px] font-black uppercase text-stone-400">Location</label>
              <input type="text" id="target" placeholder="e.g. Riccarton Hub" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50">
            </div>
          </div>

          <div>
            <label class="block text-[9px] font-black uppercase text-stone-400">KPI Outcome</label>
            <select id="kpi" required class="w-full p-2 rounded-lg mt-1 text-sm bg-stone-50 border cursor-pointer">
              <option value="" disabled selected>Select KPI...</option>
              <option value="Rapport Building">Rapport Building</option>
              <option value="Mentoring">Mentoring</option>
              <option value="Crisis Support">Crisis Support</option>
              <option value="Skills Building">Skills Building</option>
              <option value="Community Engagement">Community Engagement</option>
            </select>
          </div>

          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-[9px] font-black uppercase text-stone-400">Impact Intensity</label>
              <span id="impactBadge" class="text-[9px] font-bold px-2 py-0.5 rounded bg-green-100 text-green-800 uppercase">Lvl 0</span>
            </div>
            <input type="range" id="impact" min="0" max="5" value="0" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-green-700">
          </div>

          <textarea id="notes" placeholder="Detailed notes..." class="w-full p-2 border rounded-lg mt-1 h-20 text-sm bg-stone-50"></textarea>

          <button type="submit" id="submitBtn" class="w-full bg-stone-900 text-white font-bold py-4 rounded-xl shadow-md hover:bg-black transition uppercase tracking-widest text-[10px]">
            Send to Sheet
          </button>
          <button type="button" id="cancelEdit" onclick="resetToNew()"
            class="hidden w-full text-stone-400 font-bold py-2 uppercase text-[9px] tracking-widest mt-2 hover:text-stone-600">
            Cancel Edit
          </button>
        </form>
      </div>

      <div class="lg:col-span-2 space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-green-600 text-center">
            <p class="text-stone-400 text-[10px] font-black uppercase tracking-tighter">Total Hours</p>
            <p id="totalHours" class="text-3xl font-black">0</p>
          </div>
          <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-red-600 text-center">
            <p class="text-stone-400 text-[10px] font-black uppercase tracking-tighter">High Impact</p>
            <p id="totalHighImpact" class="text-3xl font-black">0</p>
          </div>
          <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500 text-center">
            <p class="text-stone-400 text-[10px] font-black uppercase tracking-tighter">Log Count</p>
            <p id="totalLogs" class="text-3xl font-black">0</p>
          </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm">
          <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
            <h2 class="text-xs font-black uppercase text-stone-400 tracking-widest">Engagement History</h2>

            <div class="flex flex-wrap gap-2 items-center">
              <div class="flex items-center gap-2">
                <input id="searchQuery" type="text"
                  placeholder="Search (kpi/target/notes/id)..."
                  class="p-2 border rounded-lg text-sm bg-stone-50 w-[260px] max-w-full">
              </div>

              <div class="flex items-center gap-2">
                <label class="flex items-center gap-2 text-[10px] font-black uppercase text-stone-400 tracking-widest">
                  <input id="highImpactOnly" type="checkbox" class="accent-green-700">
                  High Impact (4+)
                </label>
              </div>

              <div class="flex items-center gap-2">
                <select id="relationalFilter" class="p-2 border rounded-lg text-sm bg-stone-50 cursor-pointer">
                  <option value="All" selected>All Types</option>
                  <option value="One-on-One">One-on-One</option>
                  <option value="Group Session">Group Session</option>
                  <option value="Event/Bush Work">Event/Bush Work</option>
                  <option value="Prep & Admin">Prep & Admin</option>
                </select>
              </div>

              <div class="flex items-center gap-2">
                <select id="sortSelect" class="p-2 border rounded-lg text-sm bg-stone-50 cursor-pointer">
                  <option value="newest" selected>Sort: Newest</option>
                  <option value="oldest">Sort: Oldest</option>
                  <option value="hoursDesc">Sort: Highest Hours</option>
                  <option value="impactDesc">Sort: Highest Impact</option>
                </select>
              </div>
            </div>
          </div>

          <div class="mt-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div class="flex items-center gap-2">
              <span class="text-[10px] font-black uppercase text-stone-400 tracking-widest">Page</span>
              <button id="prevPageBtn" class="px-3 py-2 border rounded-lg bg-stone-50 hover:bg-stone-100 disabled:opacity-50 disabled:cursor-not-allowed" onclick="prevPage()">
                Prev
              </button>
              <div class="text-[10px] font-black uppercase text-stone-500" id="pageMeta">1 / 1</div>
              <button id="nextPageBtn" class="px-3 py-2 border rounded-lg bg-stone-50 hover:bg-stone-100 disabled:opacity-50 disabled:cursor-not-allowed" onclick="nextPage()">
                Next
              </button>
            </div>

            <div class="flex items-center gap-2">
              <span class="text-[10px] font-black uppercase text-stone-400 tracking-widest">Rows</span>
              <select id="pageSizeSelect" class="p-2 border rounded-lg text-sm bg-stone-50 cursor-pointer">
                <option value="10">10</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
          </div>

          <div id="logList" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 mt-4">
            <p class="text-stone-400 italic text-sm text-center py-20">Refreshing Master Sheet...</p>
          </div>

          <div class="mt-3 text-center text-[10px] font-black uppercase text-stone-400 tracking-widest" id="resultsMeta"></div>
        </div>
      </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
      <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="text-center md:text-left">
          <h2 class="text-[9px] font-black uppercase text-stone-400 tracking-widest mb-1 leading-none">Term Progress</h2>
          <p class="text-lg font-black leading-none">
            <span id="displayPercent">0</span>% <span class="text-[10px] font-normal text-stone-400 italic">of 100h</span>
          </p>
        </div>
        <div class="flex-1 w-full md:max-w-xl px-2">
          <div class="w-full bg-stone-100 h-3 rounded-full overflow-hidden border border-stone-200">
            <div id="progressBar" class="bg-green-600 h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
          </div>
        </div>
        <p class="text-xs font-bold text-green-800 bg-green-50 px-3 py-1 rounded-full border border-green-100" id="hoursRemainingText">100 hours left</p>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbysAqWLxNrPT8-jBRB1v833Fqez2ojPwOfRJ2dzN8dqhgsCKuAwOz--WiK3zi5k9q08RA/exec";
    const TERM_GOAL = 100;

    let allLogs = [];
    let logsPage = [];
    let editingId = null;

    let isBusy = false;

    // Paging/filter/sort state
    let pageIndex = 0;

    function generateId() {
      return 'ID-' + Math.random().toString(36).slice(2, 11) + Date.now();
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(text, colorClass, syncing = false) {
      const status = document.getElementById('status');
      status.innerText = text;
      status.className = colorClass + ' text-[10px] font-black uppercase tracking-widest mt-1' + (syncing ? ' syncing' : '');
    }

    function setLastUpdated(ts = new Date()) {
      const el = document.getElementById('lastUpdated');
      el.style.display = 'block';
      el.innerText = `● Last updated: ${ts.toLocaleString()}`;
    }

    function normalizeDateForInput(dateVal) {
      const s = String(dateVal ?? "").trim();
      if (!s) return "";
      // Keep stable for strict YYYY-MM-DD values.
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

      // Best-effort conversion for other formats.
      const d = new Date(s);
      if (isNaN(d.getTime())) return "";
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function setBusy(busy) {
      isBusy = busy;

      const refreshBtn = document.getElementById('refreshBtn');
      const submitBtn = document.getElementById('submitBtn');
      const cancelEdit = document.getElementById('cancelEdit');

      if (refreshBtn) refreshBtn.disabled = busy;
      if (submitBtn) {
        submitBtn.disabled = busy;
        if (busy) submitBtn.classList.add('btn-disabled'); else submitBtn.classList.remove('btn-disabled');
      }
      if (cancelEdit) {
        cancelEdit.disabled = busy;
        if (busy) cancelEdit.classList.add('btn-disabled'); else cancelEdit.classList.remove('btn-disabled');
      }
    }

    function showFormError(msg) {
      const el = document.getElementById('formError');
      el.innerText = msg;
      el.classList.remove('hidden');
    }

    function clearFormError() {
      const el = document.getElementById('formError');
      el.innerText = "";
      el.classList.add('hidden');
    }

    function readFormEntry() {
      const entry = {
        date: document.getElementById('date').value,
        hours: document.getElementById('hours').value,
        relationalType: document.getElementById('relationalType').value,
        attendance: document.getElementById('attendance').value,
        target: document.getElementById('target').value,
        kpi: document.getElementById('kpi').value,
        impact: document.getElementById('impact').value,
        notes: document.getElementById('notes').value,
        id: editingId || generateId()
      };
      return entry;
    }

    function validateEntry(entry) {
      if (!entry.date) return "Date is required.";
      if (!entry.relationalType) return "Relational Type is required.";
      if (!entry.kpi) return "KPI Outcome is required.";
      if (!entry.target || !String(entry.target).trim()) return "Location is required.";
      if (entry.notes == null) entry.notes = "";

      const hoursNum = Number(entry.hours);
      if (!isFinite(hoursNum) || hoursNum < 0) return "Hours must be a valid number (>= 0).";

      const attendanceNum = Number(entry.attendance);
      if (!isFinite(attendanceNum) || attendanceNum < 1) return "Attendance must be at least 1.";

      const impactNum = Number(entry.impact);
      if (!isFinite(impactNum) || impactNum < 0 || impactNum > 5) return "Impact Intensity must be between 0 and 5.";

      return null;
    }

    async function postToSheet(payload) {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const text = await res.text().catch(() => "");
      if (!res.ok) throw new Error(text || `HTTP ${res.status}`);
      return text;
    }

    function computeStats() {
      const totalHrs = allLogs.reduce((sum, log) => sum + parseFloat(log.hours || 0), 0);
      const highImpactCount = allLogs.filter(log => parseInt(log.impact, 10) >= 4).length;
      const progressPercent = Math.min((totalHrs / TERM_GOAL) * 100, 100);

      document.getElementById('totalHours').innerText = totalHrs.toFixed(1);
      document.getElementById('totalHighImpact').innerText = String(highImpactCount);
      document.getElementById('totalLogs').innerText = String(allLogs.length);
      document.getElementById('displayPercent').innerText = progressPercent.toFixed(0);
      document.getElementById('progressBar').style.width = `${progressPercent}%`;

      const remaining = TERM_GOAL - totalHrs;
      document.getElementById('hoursRemainingText').innerText =
        remaining > 0 ? `${remaining.toFixed(1)}h left` : "Goal Hit! 🏆";
    }

    function getFilteredSortedLogs() {
      const q = String(document.getElementById('searchQuery').value || "").trim().toLowerCase();
      const highOnly = document.getElementById('highImpactOnly').checked;
      const relFilter = document.getElementById('relationalFilter').value;
      const sortKey = document.getElementById('sortSelect').value;

      let out = [...allLogs];

      if (q) {
        out = out.filter(l => {
          const hay = [
            l.id, l.date, l.relationalType, l.attendance, l.target, l.kpi, l.hours, l.impact, l.notes
          ].map(x => String(x ?? "")).join(" ").toLowerCase();
          return hay.includes(q);
        });
      }

      if (highOnly) {
        out = out.filter(l => parseInt(l.impact, 10) >= 4);
      }

      if (relFilter && relFilter !== "All") {
        out = out.filter(l => String(l.relationalType) === relFilter);
      }

      out.sort((a, b) => {
        const sort = sortKey;

        if (sort === "newest" || sort === "oldest") {
          const ad = new Date(normalizeDateForInput(a.date) + "T00:00:00").getTime();
          const bd = new Date(normalizeDateForInput(b.date) + "T00:00:00").getTime();
          return sort === "newest" ? (bd - ad) : (ad - bd);
        }

        if (sort === "hoursDesc") {
          return (parseFloat(b.hours || 0) - parseFloat(a.hours || 0));
        }

        if (sort === "impactDesc") {
          return (parseInt(b.impact, 10) - parseInt(a.impact, 10));
        }

        return 0;
      });

      return out;
    }

    function renderPaginationAndLogs() {
      const list = document.getElementById('logList');
      const resultsMeta = document.getElementById('resultsMeta');

      const pageSize = Number(document.getElementById('pageSizeSelect').value || 25);
      const filtered = getFilteredSortedLogs();

      const totalItems = filtered.length;
      const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
      pageIndex = Math.min(pageIndex, totalPages - 1);

      document.getElementById('pageMeta').innerText = `${pageIndex + 1} / ${totalPages}`;
      document.getElementById('prevPageBtn').disabled = pageIndex <= 0 || isBusy;
      document.getElementById('nextPageBtn').disabled = (pageIndex >= totalPages - 1) || isBusy;

      const start = pageIndex * pageSize;
      const end = start + pageSize;
      logsPage = filtered.slice(start, end);

      resultsMeta.innerText = totalItems
        ? `Showing ${Math.min(end, totalItems)} of ${totalItems}`
        : `No results found`;

      if (!allLogs.length) {
        list.innerHTML = '<p class="text-stone-400 italic text-sm text-center py-20">No history found on Google Sheet.</p>';
        return;
      }

      if (!logsPage.length) {
        list.innerHTML = '<p class="text-stone-400 italic text-sm text-center py-20">No results match your filters.</p>';
        return;
      }

      list.innerHTML = logsPage.map((log) => {
        const impact = parseInt(log.impact, 10);
        const impactBadgeClass = impact >= 4 ? 'bg-red-600 text-white' : 'bg-stone-200 text-stone-700';
        const dateStr = normalizeDateForInput(log.date);

        const btnCommon = isBusy ? 'disabled="disabled"' : '';
        const btnClass = isBusy ? 'btn-disabled' : '';

        return `
          <div class="p-4 rounded-xl bg-stone-50 border border-stone-200 shadow-sm relative group">
            <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <button ${btnCommon} onclick="startEdit('${escapeHtml(log.id)}')" class="text-[9px] font-black text-blue-500 uppercase bg-white px-2 py-1 rounded border shadow-sm ${btnClass}">Edit</button>
              <button ${btnCommon} onclick="deleteRow('${escapeHtml(log.id)}')" class="text-[9px] font-black text-red-500 uppercase bg-white px-2 py-1 rounded border shadow-sm ${btnClass}">Del</button>
            </div>

            <div class="flex justify-between items-start mb-2 gap-3">
              <div class="flex flex-col">
                <span class="text-[10px] font-black text-stone-400 uppercase tracking-tighter">${escapeHtml(dateStr)}</span>
                <h4 class="font-bold text-stone-800 text-sm">${escapeHtml(log.kpi)}</h4>
              </div>
              <span class="text-[9px] font-black px-2 py-1 rounded-full ${impactBadgeClass}">LVL ${escapeHtml(impact)}</span>
            </div>

            <div class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2 text-[9px] font-bold uppercase">
              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">ID:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.id)}</span>
              </div>
              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">Relational:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.relationalType)}</span>
              </div>
              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">Attendance:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.attendance)} people</span>
              </div>
              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">Location:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.target)}</span>
              </div>
              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">Hours:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.hours)}h</span>
              </div>
              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">KPI:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.kpi)}</span>
              </div>
            </div>

            <p class="text-xs text-stone-600 mt-3 italic leading-relaxed">Notes: "${escapeHtml(log.notes || 'No notes.')} "</p>
          </div>
        `;
      }).join('');
    }

    function updateUI() {
      computeStats();
      renderPaginationAndLogs();
    }

    async function fullSync() {
      if (isBusy) return;

      setBusy(true);
      clearFormError();

      setStatus("● Refreshing From Master Sheet...", "text-blue-600", true);
      try {
        const res = await fetch(SCRIPT_URL, { method: 'GET', cache: 'no-store' });
        const text = await res.text();

        let data;
        try { data = JSON.parse(text); }
        catch (err) {
          throw new Error("Non-JSON response from server: " + text.slice(0, 250));
        }

        allLogs = Array.isArray(data) ? data : [];
        pageIndex = 0;

        updateUI();
        setLastUpdated(new Date());
        setStatus("● Up to Date", "text-green-600");
      } catch (err) {
        console.error(err);
        setStatus("● Connection Error", "text-red-600");
        document.getElementById('logList').innerHTML =
          '<p class="text-red-600 italic text-sm text-center py-20">Failed to load. Check Apps Script deployment + open console.</p>';
      } finally {
        setBusy(false);
      }
    }

    function setFormForEntry(entry) {
      document.getElementById('date').value = normalizeDateForInput(entry.date);
      document.getElementById('hours').value = entry.hours ?? "";
      document.getElementById('relationalType').value = entry.relationalType ?? "";
      document.getElementById('attendance').value = entry.attendance ?? 1;
      document.getElementById('target').value = entry.target ?? "";
      document.getElementById('kpi').value = entry.kpi ?? "";
      document.getElementById('impact').value = entry.impact ?? 0;
      document.getElementById('impactBadge').innerText = `Lvl ${entry.impact ?? 0}`;
      document.getElementById('notes').value = entry.notes ?? "";
    }

    function startEdit(id) {
      if (isBusy) return;

      const entry = allLogs.find(l => String(l.id) === String(id));
      if (!entry) return;

      editingId = id;

      document.getElementById('editModeBanner').classList.remove('hidden');
      document.getElementById('editingIdText').innerText = String(id);

      setFormForEntry(entry);

      document.getElementById('formTitle').innerText = "Edit Entry";
      document.getElementById('formContainer').classList.add('edit-mode');

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.innerText = "Apply Edit";
      submitBtn.classList.remove('bg-stone-900');
      submitBtn.classList.add('bg-blue-600');

      document.getElementById('cancelEdit').classList.remove('hidden');

      clearFormError();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetToNew() {
      if (isBusy) return;

      editingId = null;

      document.getElementById('logForm').reset();

      document.getElementById('formTitle').innerText = "New Engagement";
      document.getElementById('formContainer').classList.remove('edit-mode');

      document.getElementById('editModeBanner').classList.add('hidden');
      document.getElementById('editingIdText').innerText = "";

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.innerText = "Send to Sheet";
      submitBtn.classList.remove('bg-blue-600');
      submitBtn.classList.add('bg-stone-900');

      document.getElementById('cancelEdit').classList.add('hidden');
      document.getElementById('impactBadge').innerText = 'Lvl 0';

      clearFormError();
    }

    async function deleteRow(id) {
      if (isBusy) return;
      if (!confirm("Delete this from Google Sheet?")) return;

      setBusy(true);
      setStatus("● Deleting From Sheet...", "text-red-600", true);
      clearFormError();

      try {
        const text = await postToSheet({ action: "delete", id });
        setStatus(`● ${text || "Deleted"}`, "text-green-600");
        await fullSync();
        resetToNew();
      } catch (err) {
        console.error(err);
        setStatus("● Save Failed", "text-red-600");
        alert(String(err?.message || err));
      } finally {
        setBusy(false);
      }
    }

    // Events: search/filter/sort/page
    function onFiltersChanged() {
      pageIndex = 0;
      renderPaginationAndLogs();
    }

    document.getElementById('searchQuery').addEventListener('input', () => onFiltersChanged());
    document.getElementById('highImpactOnly').addEventListener('change', () => onFiltersChanged());
    document.getElementById('relationalFilter').addEventListener('change', () => onFiltersChanged());
    document.getElementById('sortSelect').addEventListener('change', () => onFiltersChanged());
    document.getElementById('pageSizeSelect').addEventListener('change', () => { pageIndex = 0; renderPaginationAndLogs(); });

    function prevPage() {
      if (isBusy) return;
      pageIndex = Math.max(0, pageIndex - 1);
      renderPaginationAndLogs();
    }

    function nextPage() {
      if (isBusy) return;
      pageIndex = pageIndex + 1;
      renderPaginationAndLogs();
    }

    // Impact badge
    document.getElementById('impact').addEventListener('input', (e) => {
      document.getElementById('impactBadge').innerText = `Lvl ${e.target.value}`;
    });

    // Form submit (add/edit)
    document.getElementById('logForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isBusy) return;

      const entry = readFormEntry();

      const validationError = validateEntry(entry);
      if (validationError) {
        showFormError(validationError);
        setStatus("● Check inputs", "text-red-600");
        return;
      }

      clearFormError();

      setBusy(true);
      setStatus(editingId ? "● Updating Sheet..." : "● Adding to Sheet...", "text-blue-600", true);

      try {
        const payload = editingId
          ? { action: "edit", newEntry: entry }
          : { action: "add", data: entry };

        const resultText = await postToSheet(payload);
        setStatus(`● ${resultText || (editingId ? "Updated" : "Added")}`, "text-green-600");

        // Only reset after success
        resetToNew();
        await fullSync();
      } catch (err) {
        console.error(err);
        setStatus("● Save Failed", "text-red-600");
        showFormError(String(err?.message || err));
      } finally {
        setBusy(false);
      }
    });

    // Initialize
    fullSync();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Work Impact Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f4; padding-bottom: 140px; }
        .syncing { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-stone-300 pb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold text-stone-800 tracking-tight">Impact & KPI Tracker</h1>
                <p id="status" class="text-stone-500 text-[10px] font-black uppercase tracking-widest mt-1">● Ready</p>
            </div>
            <div class="flex gap-2">
                <button onclick="pullFromSheet()" class="bg-green-600 text-white text-[10px] font-black px-4 py-2 rounded hover:bg-green-700 transition uppercase tracking-widest shadow-sm">Refresh From Sheet</button>
                <button onclick="syncToGoogle()" class="bg-blue-600 text-white text-[10px] font-black px-4 py-2 rounded hover:bg-blue-700 transition uppercase tracking-widest shadow-sm">Push Local to Sheet</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border-t-4 border-green-700 h-fit">
                <h2 class="text-xl font-bold mb-4 text-stone-800 tracking-tight">Log Engagement</h2>
                <form id="logForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-stone-500">Date</label>
                            <input type="date" id="date" required class="w-full p-2 border rounded mt-1 text-sm bg-stone-50">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase text-stone-500 text-right">Hours</label>
                            <input type="number" id="hours" step="0.5" required class="w-full p-2 border rounded mt-1 text-sm bg-stone-50 text-right">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase text-stone-500">Outcome (KPI)</label>
                        <input list="kpi-options" id="kpi" required class="w-full p-2 border rounded mt-1 text-sm bg-stone-50">
                        <datalist id="kpi-options">
                            <option value="Rapport Building"><option value="Crisis Intervention"><option value="Skills Building"><option value="Prep & Planning">
                        </datalist>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase text-stone-500">Impact Intensity</label>
                        <input type="range" id="impact" min="1" max="5" value="1" class="w-full h-2 bg-stone-200 rounded-lg mt-2">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase text-stone-500">Notes</label>
                        <textarea id="notes" class="w-full p-2 border rounded mt-1 h-16 text-sm bg-stone-50"></textarea>
                    </div>

                    <input type="hidden" id="relationalType" value="General">
                    <input type="hidden" id="attendance" value="1">
                    <input type="hidden" id="target" value="N/A">

                    <button type="submit" class="w-full bg-green-700 text-white font-bold py-3 rounded hover:bg-green-800 transition shadow-lg uppercase tracking-widest text-xs">Save Locally & Push</button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div id="logList" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 bg-white p-4 rounded-xl shadow-sm">
                    <p class="text-stone-400 italic text-center py-10">Use "Refresh from Sheet" to load your history.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbySYKAD7eey3_PNVrIiIZU6JDh-zg34o_Hl4QHoG5kcOdIoqsopwD63BfMjDtYazIlJIw/exec"; 
        let logs = JSON.parse(localStorage.getItem('youthWorkImpact_vFINAL')) || [];

        function updateUI() {
            localStorage.setItem('youthWorkImpact_vFINAL', JSON.stringify(logs));
            const list = document.getElementById('logList');
            if (logs.length === 0) {
                list.innerHTML = '<p class="text-stone-400 italic text-center py-10">No logs found.</p>';
                return;
            }
            list.innerHTML = logs.map((log, index) => `
                <div class="p-4 rounded-lg bg-stone-50 border border-stone-200 shadow-sm relative">
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-stone-800 text-sm">${log.kpi}</h4>
                        <span class="text-[10px] font-bold text-stone-400">${log.date}</span>
                    </div>
                    <p class="text-xs text-stone-600 mt-1 italic">"${log.notes}"</p>
                    <div class="mt-2 text-[10px] font-bold text-green-700 uppercase">${log.hours} Hours • Impact Lvl ${log.impact}</div>
                    <button onclick="deleteLog(${index})" class="text-[9px] text-red-400 mt-2 font-bold uppercase hover:text-red-600 transition">Remove Locally</button>
                </div>
            `).join('');
        }

        // PULL DATA FROM THE SHEET (THE FIX FOR MULTI-DEVICE)
        async function pullFromSheet() {
            const status = document.getElementById('status');
            status.innerText = "● Downloading from Sheet...";
            status.className = "text-blue-600 text-[10px] font-black uppercase tracking-widest mt-1 syncing";

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                logs = data; // Replace local logs with the Sheet's "Master List"
                updateUI();
                status.innerText = "● Refresh Success";
                status.className = "text-green-600 text-[10px] font-black uppercase tracking-widest mt-1";
            } catch (err) {
                status.innerText = "● Error Pulling Data";
                status.className = "text-red-600 text-[10px] font-black uppercase tracking-widest mt-1";
            }
        }

        // PUSH DATA TO THE SHEET
        async function syncToGoogle(singleLog = null) {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ data: singleLog ? singleLog : logs })
                });
            } catch (err) { console.error("Sync error"); }
        }

        document.getElementById('logForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const log = {
                date: document.getElementById('date').value,
                hours: document.getElementById('hours').value,
                relationalType: document.getElementById('relationalType').value,
                attendance: document.getElementById('attendance').value,
                target: document.getElementById('target').value,
                kpi: document.getElementById('kpi').value,
                impact: document.getElementById('impact').value,
                notes: document.getElementById('notes').value
            };
            logs.unshift(log); 
            updateUI();
            e.target.reset();
            await syncToGoogle(log);
        });

        function deleteLog(index) {
            if(confirm("This only removes it from this screen. To delete permanently, you must edit the Google Sheet directly.")) {
                logs.splice(index, 1);
                updateUI();
            }
        }

        updateUI();
    </script>
</body>
</html>

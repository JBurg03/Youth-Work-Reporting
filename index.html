<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Work Impact Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f4; padding-bottom: 120px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; background: #15803d; cursor: pointer; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); margin-top: -8px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #e7e5e4; border-radius: 4px; }
        .syncing { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        input::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-stone-300 pb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold text-stone-800 tracking-tight">Impact & KPI Tracker</h1>
                <p id="status" class="text-stone-500 text-[10px] font-black uppercase tracking-widest mt-1">● Ready / Local Mode</p>
            </div>
            <div class="flex gap-2">
                <button onclick="syncToGoogle()" class="bg-blue-600 text-white text-[10px] font-black px-4 py-2 rounded hover:bg-blue-700 transition uppercase tracking-widest shadow-sm">Force Sync to Sheet</button>
                <button onclick="exportToCSV()" class="bg-stone-800 text-white text-[10px] font-black px-4 py-2 rounded hover:bg-stone-700 transition uppercase tracking-widest">Download CSV</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border-t-4 border-green-700 h-fit">
                <h2 class="text-xl font-bold mb-4 text-stone-800 tracking-tight">Log Engagement</h2>
                <form id="logForm" class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-stone-500">Date</label>
                            <input type="date" id="date" required class="w-full p-2 border rounded mt-1 text-sm focus:ring-2 focus:ring-green-600 outline-none bg-stone-50">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase text-stone-500 text-right">Hours</label>
                            <input type="number" id="hours" step="0.5" placeholder="1.5" required class="w-full p-2 border rounded mt-1 text-sm focus:ring-2 focus:ring-green-600 outline-none bg-stone-50 text-right">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-stone-500">Wider Group</label>
                            <input type="text" id="group" placeholder="e.g. Riccarton Youth" class="w-full p-2 border rounded mt-1 text-sm focus:ring-2 focus:ring-green-600 outline-none bg-stone-50">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase text-stone-500">Person / Event</label>
                            <input type="text" id="target" placeholder="e.g. Bench-ish Run" class="w-full p-2 border rounded mt-1 text-sm focus:ring-2 focus:ring-green-600 outline-none bg-stone-50">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase text-stone-500">Primary Outcome</label>
                        <input list="kpi-options" id="kpi" placeholder="Search or type outcome..." required class="w-full p-2 border rounded mt-1 text-sm font-medium bg-stone-50 focus:ring-2 focus:ring-green-600 outline-none">
                        <datalist id="kpi-options">
                            <option value="Prep & Planning">
                            <option value="Rapport Building">
                            <option value="Attendance Support">
                            <option value="Conflict Resolution">
                            <option value="Skills Building">
                            <option value="Mental Health Support">
                            <option value="Crisis Intervention">
                        </datalist>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-[10px] font-black uppercase text-stone-500">Impact Intensity</label>
                            <span id="impactBadge" class="text-[10px] font-bold px-2 py-0.5 rounded bg-green-100 text-green-800 uppercase">Level 1</span>
                        </div>
                        <input type="range" id="impact" min="1" max="5" value="1" step="1" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-green-700 mt-2">
                        
                        <div id="impactDisplayBox" class="mt-4 p-4 bg-stone-50 border rounded text-center min-h-[80px] flex flex-col justify-center shadow-inner">
                            <p id="impactTitle" class="text-xs font-bold text-green-900 mb-1 tracking-tight">Level 1: Baseline Rapport</p>
                            <p id="impactDesc" class="text-[10px] text-stone-500 leading-tight italic">Initial connection or routine planning work.</p>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase text-stone-500">Evidence Notes</label>
                        <textarea id="notes" class="w-full p-2 border rounded mt-1 h-20 text-sm focus:ring-2 focus:ring-green-600 outline-none bg-stone-50" placeholder="Provide context..."></textarea>
                    </div>

                    <button type="submit" class="w-full bg-green-700 text-white font-bold py-3 rounded hover:bg-green-800 transition shadow-lg uppercase tracking-widest text-xs">Save Session & Sync</button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-green-600">
                        <p class="text-stone-400 text-[10px] font-black uppercase">Term Hours</p>
                        <p id="totalHours" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-red-600">
                        <p class="text-stone-400 text-[10px] font-black uppercase">Critical (4-5)</p>
                        <p id="totalHighImpact" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-blue-500">
                        <p class="text-stone-400 text-[10px] font-black uppercase">Total Logs</p>
                        <p id="totalLogs" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <div class="flex justify-between items-center border-b pb-2 mb-4">
                        <h2 class="text-lg font-bold text-stone-800 tracking-tight">Recent Engagement Log</h2>
                        <button onclick="clearLogs()" class="text-[9px] font-bold text-stone-300 hover:text-red-500 uppercase transition">Clear All</button>
                    </div>
                    <div id="logList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="text-center md:text-left">
                    <h2 class="text-[9px] font-black uppercase text-stone-400 tracking-widest leading-none mb-1">Term Progress</h2>
                    <p class="text-lg font-black text-stone-800 leading-none"><span id="displayPercent">0</span>% <span class="text-[10px] font-normal text-stone-400 italic">of 100h Goal</span></p>
                </div>
                <div class="flex-1 w-full md:max-w-xl">
                    <div class="w-full bg-stone-100 h-3 rounded-full overflow-hidden border border-stone-200">
                        <div id="progressBar" class="bg-green-600 h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                    </div>
                </div>
                <p class="text-xs font-bold text-green-800 bg-green-50 px-3 py-1 rounded-full border border-green-100" id="hoursRemainingText">100 hours to go</p>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzf4TIs2iW7W7812R_9HjV-9-6mKx6UAs9rYV0fHqG0tY0Z_9Z_9Z_9Z/exec"; 
        const TERM_GOAL = 100;

        const impactInfo = {
            1: { title: "Level 1: Baseline Rapport", desc: "Initial connection or routine planning work.", color: "bg-stone-200 text-stone-700" },
            2: { title: "Level 2: Trust Building", desc: "Consistent engagement and sharing.", color: "bg-green-100 text-green-800" },
            3: { title: "Level 3: Focused Growth", desc: "Working on specific skills or personal goals.", color: "bg-blue-600 text-white" },
            4: { title: "Level 4: Major Breakthrough", desc: "Significant positive shift in attitude.", color: "bg-orange-600 text-white" },
            5: { title: "Level 5: Critical Success", desc: "Crisis de-escalation or incident prevention.", color: "bg-red-700 text-white" }
        };

        let logs = JSON.parse(localStorage.getItem('youthWorkImpact_vLatest')) || [];

        const slider = document.getElementById('impact');
        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('impactTitle').innerText = impactInfo[val].title;
            document.getElementById('impactDesc').innerText = impactInfo[val].desc;
            document.getElementById('impactBadge').innerText = `Level ${val}`;
        });

        function updateUI() {
            localStorage.setItem('youthWorkImpact_vLatest', JSON.stringify(logs));
            const totalHours = logs.reduce((sum, log) => sum + parseFloat(log.hours || 0), 0);
            const highImpact = logs.filter(log => parseInt(log.impact) >= 4).length;
            const percentage = Math.min((totalHours / TERM_GOAL) * 100, 100);
            
            document.getElementById('totalHours').innerText = totalHours;
            document.getElementById('totalHighImpact').innerText = highImpact;
            document.getElementById('totalLogs').innerText = logs.length;
            document.getElementById('displayPercent').innerText = percentage.toFixed(0);
            document.getElementById('progressBar').style.width = `${percentage}%`;
            document.getElementById('hoursRemainingText').innerText = (TERM_GOAL - totalHours) > 0 ? `${(TERM_GOAL - totalHours).toFixed(1)} hours left` : "Goal Achieved! 🏆";

            const list = document.getElementById('logList');
            if (logs.length === 0) {
                list.innerHTML = '<p class="text-stone-400 italic text-sm py-10 text-center">No logs recorded yet.</p>';
                return;
            }

            list.innerHTML = logs.map((log, index) => {
                const info = impactInfo[log.impact] || impactInfo[1];
                return `
                <div class="flex gap-4 p-4 rounded-lg bg-stone-50 border border-stone-200 shadow-sm transition hover:border-green-300">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <div class="flex flex-col">
                                <h4 class="font-bold text-stone-800 text-sm tracking-tight">${log.kpi}</h4>
                                <span class="text-[9px] text-stone-400 font-medium italic">${log.group ? log.group : 'General'} • ${log.target ? log.target : 'No Specific Target'}</span>
                            </div>
                            <span class="text-[8px] font-black px-2 py-1 rounded ${info.color}">${log.impact >= 4 ? 'CRITICAL' : 'LEVEL '+log.impact}</span>
                        </div>
                        <div class="text-[10px] font-bold text-stone-400 mt-2 uppercase tracking-tighter">${log.date} • ${log.hours} Hours</div>
                        <p class="text-xs text-stone-600 mt-2 italic leading-relaxed">"${log.notes || 'No notes provided.'}"</p>
                        <button onclick="deleteLog(${index})" class="text-[9px] text-stone-300 mt-2 hover:text-red-500 font-bold uppercase transition">Remove Entry</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function syncToGoogle() {
            const status = document.getElementById('status');
            status.innerText = "● Syncing...";
            status.className = "text-blue-600 text-[10px] font-black uppercase tracking-widest mt-1 syncing";

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(logs)
                });
                status.innerText = "● Sync Success: " + new Date().toLocaleTimeString();
                status.className = "text-green-600 text-[10px] font-black uppercase tracking-widest mt-1";
            } catch (err) {
                status.innerText = "● Sync Failed";
                status.className = "text-red-600 text-[10px] font-black uppercase tracking-widest mt-1";
            }
        }

        document.getElementById('logForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const log = {
                date: document.getElementById('date').value,
                hours: document.getElementById('hours').value,
                group: document.getElementById('group').value,
                target: document.getElementById('target').value,
                kpi: document.getElementById('kpi').value,
                impact: document.getElementById('impact').value,
                notes: document.getElementById('notes').value
            };
            logs.unshift(log); 
            updateUI();
            
            e.target.reset();
            document.getElementById('kpi').value = ""; 
            
            document.getElementById('impactTitle').innerText = impactInfo[1].title;
            document.getElementById('impactDesc').innerText = impactInfo[1].desc;
            document.getElementById('impactBadge').innerText = "Level 1";
            
            syncToGoogle();
        });

        function deleteLog(index) { if(confirm("Permanently delete this entry?")) { logs.splice(index, 1); updateUI(); syncToGoogle(); } }
        function clearLogs() { if(confirm("Wipe ALL data for this term?")) { logs = []; updateUI(); syncToGoogle(); } }
        
        function exportToCSV() {
            let csv = "Date,Group,Target,Outcome,Hours,ImpactLevel,Notes\n";
            logs.forEach(l => csv += `"${l.date}","${l.group}","${l.target}","${l.kpi}","${l.hours}","${l.impact}","${l.notes.replace(/"/g, '""')}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `Youth_Work_Report.csv`);
            a.click();
        }

        updateUI();
    </script>
</body>
</html>

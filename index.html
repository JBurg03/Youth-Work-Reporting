<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youth Work Impact Tracker</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
    .page { display: none; }
    .active { display: block; }
    
    label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.9rem; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
    
    button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 20px; }
    button:disabled { background: #94a3b8; }
    
    nav { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
    nav button { margin-top: 0; padding: 8px 12px; font-size: 0.85rem; width: auto; background: #e2e8f0; color: var(--text); }
    nav button.active-nav { background: var(--primary); color: white; }

    .log-item { border-bottom: 1px solid #e2e8f0; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    #loginPage { text-align: center; margin-top: 100px; }
  </style>
</head>
<body>

<div class="container">
  <div id="loginPage" class="page active">
    <h1>Impact Tracker</h1>
    <p>Please sign in to continue</p>
    <div id="g_id_onload"
         data-client_id="598357137191-04lp6pqg2ehjhagg87kc5ggeaub2erpc.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
  </div>

  <div id="app" style="display:none;">
    <nav id="mainNav">
      <button onclick="showPage('entryPage')" id="nav-entry" class="active-nav">New Entry</button>
      <button onclick="showPage('historyPage')" id="nav-history">History</button>
      <button onclick="showPage('dropdownsPage')" id="nav-dropdowns" class="admin-only" style="display:none;">Dropdowns</button>
    </nav>

    <div id="entryPage" class="page">
      <div class="card">
        <h3>New Engagement</h3>
        <label>Date</label>
        <input type="date" id="logDate">

        <label>Relational Type</label>
        <select id="relationalType"></select>

        <label>KPI Outcome</label>
        <select id="kpiOutcome"></select>

        <label>Hours Spent</label>
        <input type="number" id="hours" step="0.5" placeholder="e.g. 1.5">

        <label>Notes / Impact Summary</label>
        <textarea id="notes" rows="4"></textarea>

        <button onclick="submitEntry()" id="submitBtn">Save Entry</button>
      </div>
    </div>

    <div id="historyPage" class="page">
      <h3>Recent Activity</h3>
      <div id="logList" class="card">Loading logs...</div>
    </div>

    <div id="dropdownsPage" class="page">
      <div class="card">
        <h3>Manage Dropdowns</h3>
        <p style="font-size: 0.8rem; color: #64748b;">Enter one item per line</p>
        
        <label>Relational Types</label>
        <textarea id="relationalInput" rows="5"></textarea>
        
        <label>KPI Outcomes</label>
        <textarea id="kpiInput" rows="5"></textarea>
        
        <button onclick="saveDropdowns()" id="saveDropdownBtn">Update Options</button>
      </div>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";
  let userToken = "";
  let appData = { logs: [], options: { relationalTypes: [], kpis: [] } };

  // --- 1. AUTHENTICATION ---
  function handleCredentialResponse(response) {
    userToken = response.credential;
    document.getElementById('loginPage').classList.remove('active');
    document.getElementById('app').style.display = 'block';
    showPage('entryPage');
    fetchData();
  }

  // --- 2. DATA FETCHING ---
  async function fetchData() {
    try {
      const resp = await fetch(`${SCRIPT_URL}?token=${userToken}`);
      const result = await resp.json();
      if (result.ok) {
        appData = result;
        populateDropdowns();
        renderLogs();
        if (result.role === 'admin') {
          document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
          // Fill settings textareas
          document.getElementById('relationalInput').value = result.options.relationalTypes.join('\n');
          document.getElementById('kpiInput').value = result.options.kpis.join('\n');
        }
      }
    } catch (err) { alert("Fetch error: " + err); }
  }

  function populateDropdowns() {
    const relSelect = document.getElementById('relationalType');
    const kpiSelect = document.getElementById('kpiOutcome');
    
    relSelect.innerHTML = appData.options.relationalTypes.map(t => `<option value="${t}">${t}</option>`).join('');
    kpiSelect.innerHTML = appData.options.kpis.map(k => `<option value="${k}">${k}</option>`).join('');
    document.getElementById('logDate').valueAsDate = new Date();
  }

  // --- 3. SUBMIT LOG ---
  async function submitEntry() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    
    const entry = {
      date: document.getElementById('logDate').value,
      relationalType: document.getElementById('relationalType').value,
      kpi: document.getElementById('kpiOutcome').value,
      hours: document.getElementById('hours').value,
      notes: document.getElementById('notes').value,
      id: "ID-" + Date.now()
    };

    const resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ token: userToken, action: 'add', data: entry })
    });

    const result = await resp.json();
    if (result.ok) {
      alert("Saved successfully!");
      document.getElementById('notes').value = "";
      fetchData(); // Refresh history
    }
    btn.disabled = false;
  }

  // --- 4. SAVE DROPDOWN SETTINGS ---
  async function saveDropdowns() {
    const btn = document.getElementById('saveDropdownBtn');
    btn.innerText = "Saving...";
    
    const newOptions = {
      relationalTypes: document.getElementById('relationalInput').value.split('\n').filter(s => s.trim()),
      kpis: document.getElementById('kpiInput').value.split('\n').filter(s => s.trim())
    };

    const resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ token: userToken, action: 'options_set', options: newOptions })
    });

    const result = await resp.json();
    if (result.ok) {
      alert("Dropdowns Updated!");
      fetchData(); 
    }
    btn.innerText = "Update Options";
  }

  // --- UI UTILS ---
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    
    document.querySelectorAll('#mainNav button').forEach(b => b.classList.remove('active-nav'));
    document.getElementById('nav-' + pageId.replace('Page','')).classList.add('active-nav');
  }

  function renderLogs() {
    const list = document.getElementById('logList');
    if (appData.logs.length === 0) { list.innerHTML = "No logs yet."; return; }
    list.innerHTML = appData.logs.slice(-10).reverse().map(l => `
      <div class="log-item">
        <div>
          <strong>${l.date}</strong> - ${l.relationalType}<br>
          <small>${l.kpi} (${l.hours} hrs)</small>
        </div>
      </div>
    `).join('');
  }
</script>

</body>
</html>

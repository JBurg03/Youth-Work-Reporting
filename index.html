<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youth Work Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { background-color: #f5f5f4; }
    .hidden { display: none; }
    .loader { border-top-color: #15803d; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-4 md:p-8">

  <div id="app" class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-6">
    <header class="flex justify-between items-center border-bottom pb-4 mb-6">
      <h1 class="text-2xl font-bold text-stone-800">Impact Tracker</h1>
      <div id="user-status" class="text-sm text-stone-600"></div>
    </header>

    <div id="login-section" class="flex flex-col items-center py-10">
      <h2 class="text-lg mb-4">Sign in to manage logs</h2>
      <div id="g_id_onload"
           data-client_id="598357137191-04lp6pqg2ehjhagg87kc5ggeaub2erpc.apps.googleusercontent.com"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="main-content" class="hidden">
      <form id="logForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-stone-50 p-4 rounded border">
        <input type="date" id="date" class="border p-2 rounded" required>
        <select id="relationalType" class="border p-2 rounded">
          <option value="1-on-1">1-on-1</option>
          <option value="Group">Group</option>
          <option value="Community">Community</option>
        </select>
        <input type="text" id="target" placeholder="Target (e.g. Youth Name)" class="border p-2 rounded">
        <input type="number" id="hours" placeholder="Hours" step="0.5" class="border p-2 rounded">
        <textarea id="notes" placeholder="Notes..." class="border p-2 rounded md:col-span-2"></textarea>
        <button type="submit" class="bg-green-700 text-white font-bold py-2 px-4 rounded hover:bg-green-800 md:col-span-2">Save Log</button>
      </form>

      <div id="logList" class="space-y-2">
        </div>
    </div>
  </div>

  <script>
    let authToken = "";

    async function handleCredentialResponse(response) {
      authToken = response.credential;
      document.getElementById("login-section").classList.add("hidden");
      document.getElementById("main-content").classList.remove("hidden");
      
      const res = await apiCall({ action: "me" });
      if (res.email) {
        document.getElementById("user-status").innerText = `Signed in as: ${res.email} (${res.role})`;
        loadLogs();
      } else {
        alert("Login failed: " + (res.error || "Unknown error"));
      }
    }

    async function apiCall(payload) {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(res => resolve(JSON.parse(res)))
          .withFailureHandler(err => reject(err))
          .api({ token: authToken, payload: payload });
      });
    }

    async function loadLogs() {
      const res = await apiCall({ action: "list" });
      const list = document.getElementById("logList");
      list.innerHTML = "";
      if (res.ok) {
        res.data.forEach(log => {
          const div = document.createElement("div");
          div.className = "p-3 border rounded bg-white flex justify-between";
          div.innerHTML = `<div><strong>${log.date}</strong> - ${log.target} (${log.hours}h)<br><small>${log.notes}</small></div>`;
          list.appendChild(div);
        });
      }
    }

    document.getElementById("logForm").onsubmit = async (e) => {
      e.preventDefault();
      const data = {
        date: document.getElementById("date").value,
        relationalType: document.getElementById("relationalType").value,
        target: document.getElementById("target").value,
        hours: document.getElementById("hours").value,
        notes: document.getElementById("notes").value,
        id: Date.now().toString()
      };
      const res = await apiCall({ action: "add", data: data });
      if (res.ok) {
        document.getElementById("logForm").reset();
        loadLogs();
      }
    };
  </script>
</body>
</html>

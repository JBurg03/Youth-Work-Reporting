<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Work Impact Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f4; padding-bottom: 140px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #15803d; cursor: pointer; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.1); margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e7e5e4; border-radius: 3px; }
        .syncing { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-stone-300 pb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold text-stone-800 tracking-tight text-center md:text-left">Impact & KPI Tracker</h1>
                <p id="status" class="text-stone-500 text-[10px] font-black uppercase tracking-widest mt-1">● Master Sync Mode Active</p>
            </div>
            <button onclick="fullSync()" class="bg-blue-600 text-white text-[10px] font-black px-6 py-3 rounded-xl hover:bg-blue-700 transition uppercase tracking-widest shadow-lg active:scale-95">Sync Master List</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border-t-4 border-green-700 h-fit">
                <h2 class="text-xl font-bold mb-4 text-stone-800 tracking-tight text-center">New Engagement</h2>
                <form id="logForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[9px] font-black uppercase text-stone-400">Date</label>
                            <input type="date" id="date" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50">
                        </div>
                        <div>
                            <label class="block text-[9px] font-black uppercase text-stone-400 text-right">Hours</label>
                            <input type="number" id="hours" step="0.5" min="0" placeholder="1.0" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50 text-right">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[9px] font-black uppercase text-stone-400">Relational Type</label>
                        <select id="relationalType" required class="w-full p-2 rounded-lg mt-1 text-sm bg-stone-50 border cursor-pointer">
                            <option value="" disabled selected>Select Type...</option>
                            <option value="One-on-One">One-on-One</option>
                            <option value="Group Session">Group Session</option>
                            <option value="Event/Bush Work">Event/Bush Work</option>
                            <option value="Prep & Admin">Prep & Admin</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-1">
                            <label class="block text-[9px] font-black uppercase text-stone-400">Attend.</label>
                            <input type="number" id="attendance" min="1" value="1" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-[9px] font-black uppercase text-stone-400">Location/Detail</label>
                            <input type="text" id="target" placeholder="e.g. Riccarton Hub" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[9px] font-black uppercase text-stone-400">KPI Outcome</label>
                        <select id="kpi" required class="w-full p-2 rounded-lg mt-1 text-sm bg-stone-50 border cursor-pointer">
                            <option value="" disabled selected>Select KPI...</option>
                            <option value="Rapport Building">Rapport Building</option>
                            <option value="Mentoring">Mentoring</option>
                            <option value="Crisis Support">Crisis Support</option>
                            <option value="Skills Building">Skills Building</option>
                            <option value="Community Engagement">Community Engagement</option>
                        </select>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-[9px] font-black uppercase text-stone-400">Impact Intensity</label>
                            <span id="impactBadge" class="text-[9px] font-bold px-2 py-0.5 rounded bg-green-100 text-green-800 uppercase">Lvl 0</span>
                        </div>
                        <input type="range" id="impact" min="0" max="5" value="0" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-green-700">
                    </div>

                    <textarea id="notes" placeholder="Detailed notes..." class="w-full p-2 border rounded-lg mt-1 h-20 text-sm bg-stone-50"></textarea>

                    <button type="submit" class="w-full bg-stone-900 text-white font-bold py-4 rounded-xl shadow-md hover:bg-black transition uppercase tracking-widest text-[10px]">Save & Sync</button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-green-600 text-center">
                        <p class="text-stone-400 text-[10px] font-black uppercase">Term Hours</p>
                        <p id="totalHours" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-red-600 text-center">
                        <p class="text-stone-400 text-[10px] font-black uppercase">Critical Logs</p>
                        <p id="totalHighImpact" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500 text-center">
                        <p class="text-stone-400 text-[10px] font-black uppercase">Master Total</p>
                        <p id="totalLogs" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm">
                    <h2 class="text-xs font-black uppercase text-stone-400 tracking-widest mb-4">Master Spreadsheet History</h2>
                    <div id="logList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                        <p class="text-stone-400 italic text-sm text-center py-20">Hit Sync to fetch all logs...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="text-center md:text-left">
                    <h2 class="text-[9px] font-black uppercase text-stone-400 tracking-widest leading-none mb-1 text-center md:text-left">Term Progress</h2>
                    <p class="text-lg font-black text-stone-800 leading-none"><span id="displayPercent">0</span>% <span class="text-[10px] font-normal text-stone-400 italic text-center md:text-left">of 100h</span></p>
                </div>
                <div class="flex-1 w-full md:max-w-xl px-2">
                    <div class="w-full bg-stone-100 h-3 rounded-full overflow-hidden border border-stone-200">
                        <div id="progressBar" class="bg-green-600 h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                    </div>
                </div>
                <p class="text-xs font-bold text-green-800 bg-green-50 px-3 py-1 rounded-full border border-green-100" id="hoursRemainingText">100 hours left</p>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFAyYpnEkj6KACc1uNRlrM4gb-06M5imZEEcTIvD6QQ9qR1BclrQYnovnZnsJqK5Db9Q/exec"; 
        const TERM_GOAL = 100;

        let logs = JSON.parse(localStorage.getItem('youth_master_vFinal')) || [];

        document.getElementById('impact').addEventListener('input', (e) => {
            document.getElementById('impactBadge').innerText = `Lvl ${e.target.value}`;
        });

        // DATE FORMATTER: DD/MM/YY
        function formatDisplayDate(dateStr) {
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr;
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = String(date.getFullYear()).slice(-2);
            return `${d}/${m}/${y}`;
        }

        function updateUI() {
            localStorage.setItem('youth_master_vFinal', JSON.stringify(logs));
            const totalHrs = logs.reduce((sum, log) => sum + parseFloat(log.hours || 0), 0);
            const highImpactCount = logs.filter(log => parseInt(log.impact) >= 4).length;
            const progressPercent = Math.min((totalHrs / TERM_GOAL) * 100, 100);

            document.getElementById('totalHours').innerText = totalHrs.toFixed(1);
            document.getElementById('totalHighImpact').innerText = highImpactCount;
            document.getElementById('totalLogs').innerText = logs.length;
            document.getElementById('displayPercent').innerText = progressPercent.toFixed(0);
            document.getElementById('progressBar').style.width = `${progressPercent}%`;
            document.getElementById('hoursRemainingText').innerText = (TERM_GOAL - totalHrs) > 0 ? `${(TERM_GOAL - totalHrs).toFixed(1)}h left` : "Goal Hit! 🏆";

            const list = document.getElementById('logList');
            if (logs.length === 0) {
                list.innerHTML = '<p class="text-stone-400 italic text-sm text-center py-20">No logs found. Use Sync to load from Google.</p>';
                return;
            }

            // SORTING LOGIC: Most recent date first
            const sorted = [...logs].sort((a, b) => {
                return new Date(b.date) - new Date(a.date);
            });

            list.innerHTML = sorted.map((log) => `
                <div class="p-4 rounded-xl bg-stone-50 border border-stone-200 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black text-stone-400 uppercase tracking-tighter">${formatDisplayDate(log.date)}</span>
                            <h4 class="font-bold text-stone-800 text-sm">${log.kpi}</h4>
                        </div>
                        <span class="text-[9px] font-black px-2 py-1 rounded-full ${log.impact >= 4 ? 'bg-red-600 text-white' : 'bg-stone-200 text-stone-700'}">LVL ${log.impact}</span>
                    </div>
                    <p class="text-xs text-stone-600 mt-2 italic leading-relaxed">"${log.notes || 'No notes.'}"</p>
                    <div class="mt-3 flex justify-between items-center">
                        <div class="flex gap-2">
                            <span class="text-[8px] font-bold px-2 py-0.5 rounded bg-blue-50 text-blue-600 border border-blue-100 uppercase">${log.relationalType}</span>
                            <span class="text-[8px] font-bold px-2 py-0.5 rounded bg-stone-100 text-stone-500 uppercase">${log.target}</span>
                        </div>
                        <span class="text-[10px] font-black text-stone-800">${log.hours} Hours</span>
                    </div>
                </div>
            `).join('');
        }

        async function fullSync() {
            const status = document.getElementById('status');
            status.innerText = "● Syncing Master List...";
            status.className = "text-blue-600 text-[10px] font-black uppercase tracking-widest mt-1 syncing";
            
            try {
                if(logs.length > 0) {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ data: logs })
                    });
                }
                const response = await fetch(SCRIPT_URL);
                const masterData = await response.json();
                logs = masterData;
                updateUI();
                status.innerText = "● All Sync'd with Google Sheets";
                status.className = "text-green-600 text-[10px] font-black uppercase tracking-widest mt-1";
            } catch (err) {
                status.innerText = "● Connection Error";
                status.className = "text-red-600 text-[10px] font-black uppercase tracking-widest mt-1";
            }
        }

        document.getElementById('logForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const log = {
                date: document.getElementById('date').value,
                hours: document.getElementById('hours').value,
                relationalType: document.getElementById('relationalType').value,
                attendance: document.getElementById('attendance').value,
                target: document.getElementById('target').value,
                kpi: document.getElementById('kpi').value,
                impact: document.getElementById('impact').value,
                notes: document.getElementById('notes').value
            };
            logs.unshift(log);
            updateUI();
            e.target.reset();
            // Reset impact badge back to 0 after form reset
            document.getElementById('impactBadge').innerText = 'Lvl 0';
            fullSync();
        });

        updateUI();
    </script>
</body>
</html>

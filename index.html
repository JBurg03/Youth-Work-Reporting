<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youth Work Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { background-color: #f5f5f4; }
    .hidden { display: none; }
    .loader { border-top-color: #15803d; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-4 md:p-8">

  <div id="app" class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-6">
    <header class="flex justify-between items-center border-b pb-4 mb-6">
      <h1 class="text-2xl font-bold text-stone-800">Impact Tracker</h1>
      <div id="user-status" class="text-sm text-stone-600 font-medium"></div>
    </header>

    <div id="signed-out" class="flex flex-col items-center py-10">
      <h2 class="text-lg mb-4 text-stone-700">Please sign in to continue</h2>
      <div id="g_id_onload"
           data-client_id="598357137191-04lp6pqg2ehjhagg87kc5ggeaub2erpc.apps.googleusercontent.com"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="main-content" class="hidden">
      <nav class="flex gap-4 mb-6 border-b pb-2">
        <button onclick="showSection('logs')" class="text-green-700 font-bold">Logs</button>
        <button id="nav-settings" onclick="showSection('settings')" class="text-stone-500 hover:text-green-700 font-bold hidden">Settings</button>
      </nav>

      <section id="section-logs">
        <form id="logForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-stone-50 p-4 rounded border">
          <input type="date" id="date" class="border p-2 rounded w-full" required>
          <select id="relationalType" class="border p-2 rounded w-full" required>
            <option value="">Loading types...</option>
          </select>
          <input type="text" id="target" placeholder="Target / Youth Name" class="border p-2 rounded w-full">
          <select id="kpi" class="border p-2 rounded w-full" required>
            <option value="">Loading KPIs...</option>
          </select>
          <input type="number" id="hours" placeholder="Hours" step="0.5" class="border p-2 rounded w-full">
          <input type="number" id="attendance" placeholder="Attendance Count" class="border p-2 rounded w-full">
          <textarea id="notes" placeholder="Notes..." class="border p-2 rounded md:col-span-2 w-full"></textarea>
          <button type="submit" class="bg-green-700 text-white font-bold py-2 px-4 rounded hover:bg-green-800 md:col-span-2">Save Engagement</button>
        </form>

        <div id="logList" class="space-y-3">
          </div>
      </section>

      <section id="section-settings" class="hidden space-y-6">
        <div class="bg-white p-4 border rounded shadow-sm">
          <h3 class="font-bold text-lg mb-4">Manage Dropdown Options</h3>
          <p class="text-xs text-stone-500 mb-4">Enter one option per line.</p>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold mb-1">Relational Types</label>
              <textarea id="edit-relTypes" class="w-full h-40 border p-2 rounded font-mono text-sm"></textarea>
            </div>
            <div>
              <label class="block text-sm font-bold mb-1">KPI Outcomes</label>
              <textarea id="edit-kpis" class="w-full h-40 border p-2 rounded font-mono text-sm"></textarea>
            </div>
          </div>
          <button onclick="saveDropdowns()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700">Save Dropdown Settings</button>
        </div>
      </section>
    </div>
  </div>

  <script>
    let authToken = "";

    function showSection(id) {
      document.getElementById('section-logs').classList.toggle('hidden', id !== 'logs');
      document.getElementById('section-settings').classList.toggle('hidden', id !== 'settings');
    }

    async function handleCredentialResponse(response) {
      authToken = response.credential;
      document.getElementById("signed-out").classList.add("hidden");
      document.getElementById("main-content").classList.remove("hidden");
      
      const res = await apiCall({ action: "me" });
      document.getElementById("user-status").innerText = `${res.email} (${res.role})`;
      
      if (res.role === 'admin') {
        document.getElementById('nav-settings').classList.remove('hidden');
      }
      
      await refreshDropdowns();
      await loadLogs();
    }

    async function apiCall(payload) {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(res => resolve(JSON.parse(res)))
          .withFailureHandler(err => { alert("API Error: " + err); reject(err); })
          .api({ token: authToken, payload: payload });
      });
    }

    async function refreshDropdowns() {
      const res = await apiCall({ action: "dropdowns_get" });
      if (res.ok) {
        // Fill Log Form Selects
        fillSelect("relationalType", res.options.relationalTypes);
        fillSelect("kpi", res.options.kpis);
        
        // Fill Settings Textareas
        document.getElementById("edit-relTypes").value = res.options.relationalTypes.join("\n");
        document.getElementById("edit-kpis").value = res.options.kpis.join("\n");
      }
    }

    function fillSelect(elementId, list) {
      const select = document.getElementById(elementId);
      select.innerHTML = `<option value="" disabled selected>Select ${elementId === 'kpi' ? 'KPI' : 'Type'}...</option>`;
      list.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item;
        opt.textContent = item;
        select.appendChild(opt);
      });
    }

    async function saveDropdowns() {
      const options = {
        relationalTypes: document.getElementById("edit-relTypes").value.split("\n").filter(x => x.trim()),
        kpis: document.getElementById("edit-kpis").value.split("\n").filter(x => x.trim())
      };
      const res = await apiCall({ action: "dropdowns_set", options: options });
      if (res.ok) {
        alert("Settings saved!");
        await refreshDropdowns();
        showSection('logs');
      }
    }

    async function loadLogs() {
      const res = await apiCall({ action: "list" });
      const list = document.getElementById("logList");
      list.innerHTML = "";
      if (res.ok && res.data.length > 0) {
        res.data.forEach(log => {
          const div = document.createElement("div");
          div.className = "p-3 border rounded bg-white flex flex-col shadow-sm border-l-4 border-l-green-600";
          div.innerHTML = `
            <div class="flex justify-between">
              <span class="font-bold text-stone-800">${log.date}</span>
              <span class="text-xs bg-stone-100 px-2 py-1 rounded text-stone-600">${log.relationalType}</span>
            </div>
            <div class="text-sm text-stone-700 mt-1"><strong>${log.target}</strong> — ${log.kpi} (${log.hours} hrs)</div>
            <div class="text-xs italic text-stone-500 mt-2">${log.notes || 'No notes'}</div>
          `;
          list.appendChild(div);
        });
      } else {
        list.innerHTML = `<p class="text-stone-400 text-center py-10">No logs found.</p>`;
      }
    }

    document.getElementById("logForm").onsubmit = async (e) => {
      e.preventDefault();
      const data = {
        date: document.getElementById("date").value,
        relationalType: document.getElementById("relationalType").value,
        target: document.getElementById("target").value,
        kpi: document.getElementById("kpi").value,
        hours: document.getElementById("hours").value,
        attendance: document.getElementById("attendance").value,
        notes: document.getElementById("notes").value,
        id: Date.now().toString()
      };
      const res = await apiCall({ action: "add", data: data });
      if (res.ok) {
        document.getElementById("logForm").reset();
        loadLogs();
      }
    };
  </script>
</body>
</html>

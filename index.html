<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youth Work Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { background-color: #f5f5f4; padding-bottom: 140px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #15803d; cursor: pointer; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.1); margin-top: -6px; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e7e5e4; border-radius: 3px; }
    .syncing { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .edit-mode { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
    .hidden { display: none; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div id="app" class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg p-6">
    <header class="flex justify-between items-center border-b pb-4 mb-4">
      <h1 class="text-2xl font-bold text-stone-800">Impact Tracker</h1>
      <div id="userInfo" class="text-xs text-stone-500 text-right"></div>
    </header>

    <div id="signedOut" class="flex flex-col items-center py-20">
      <div id="g_id_onload" data-client_id="598357137191-04lp6pqg2ehjhagg87kc5ggeaub2erpc.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="signedIn" class="hidden">
      <nav class="flex gap-6 mb-6 border-b text-sm font-bold text-stone-400">
        <button id="nav-logs" onclick="go('logs')" class="pb-2">LOGS</button>
        <button id="nav-admin" onclick="go('admin')" class="pb-2 hidden admin-only">ADMIN</button>
      </nav>

      <div id="page-logs" class="page-view">
        <form id="logForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-stone-50 p-4 rounded border">
          <input type="hidden" id="edit-id">
          <input type="date" id="date" class="border p-2 rounded w-full" required>
          <select id="relationalType" class="border p-2 rounded w-full" required></select>
          <input type="text" id="target" placeholder="Target Name" class="border p-2 rounded w-full">
          <select id="kpi" class="border p-2 rounded w-full" required></select>
          <input type="number" id="hours" placeholder="Hours" step="0.5" class="border p-2 rounded w-full">
          <input type="number" id="attendance" placeholder="Attendance" class="border p-2 rounded w-full">
          <div class="md:col-span-2">
            <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">Impact Score (1-10)</label>
            <input type="range" id="impact" min="1" max="10" value="5" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer">
          </div>
          <textarea id="notes" placeholder="Engagement notes..." class="border p-2 rounded md:col-span-2 w-full"></textarea>
          <button type="submit" id="save-btn" class="bg-green-700 text-white font-bold py-3 px-4 rounded md:col-span-2">Save Engagement</button>
        </form>
        <div id="logList" class="space-y-3"></div>
      </div>

      <div id="page-admin" class="page-view hidden">
        <div class="space-y-8">
          <div class="bg-white border rounded p-4">
            <h3 class="font-bold text-stone-800 mb-4">Manage Dropdown Lists</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-bold mb-1">RELATIONAL TYPES</label>
                <textarea id="edit-relTypes" class="w-full h-40 border p-2 rounded font-mono text-xs"></textarea>
              </div>
              <div>
                <label class="block text-xs font-bold mb-1">KPI OUTCOMES</label>
                <textarea id="edit-kpis" class="w-full h-40 border p-2 rounded font-mono text-xs"></textarea>
              </div>
            </div>
            <button onclick="saveDropdownSettings()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded font-bold text-sm">Save Options</button>
          </div>

          <div class="bg-white border rounded p-4">
            <h3 class="font-bold text-stone-800 mb-4">User Permissions</h3>
            <div class="space-y-4">
              <input type="text" id="admin-csv" placeholder="Admins (comma separated)" class="w-full border p-2 rounded text-sm">
              <input type="text" id="viewer-csv" placeholder="Viewers (comma separated)" class="w-full border p-2 rounded text-sm">
              <button onclick="saveAdminSettings()" class="bg-stone-800 text-white px-4 py-2 rounded font-bold text-sm">Update Users</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let authToken = "";
    let userRole = "";

    async function handleCredentialResponse(response) {
      authToken = response.credential;
      document.getElementById("signedOut").classList.add("hidden");
      document.getElementById("signedIn").classList.remove("hidden");
      const me = await apiCall({ action: "me" });
      userRole = me.role;
      document.getElementById("userInfo").innerText = `${me.email}\n${me.role.toUpperCase()}`;
      if (userRole === "admin") document.querySelectorAll(".admin-only").forEach(e => e.classList.remove("hidden"));
      await refreshDropdowns();
      await loadLogs();
    }

    function go(page) {
      document.querySelectorAll(".page-view").forEach(p => p.classList.add("hidden"));
      document.querySelectorAll("nav button").forEach(b => b.classList.remove("text-stone-800", "border-b-2", "border-stone-800"));
      document.getElementById("page-" + page).classList.remove("hidden");
      document.getElementById("nav-" + page).classList.add("text-stone-800", "border-b-2", "border-stone-800");
      if (page === 'admin') loadAdminData();
    }

    async function apiCall(payload) {
      return new Promise((resolve) => {
        google.script.run.withSuccessHandler(res => resolve(JSON.parse(res))).api({ token: authToken, payload: payload });
      });
    }

    async function refreshDropdowns() {
      const res = await apiCall({ action: "dropdowns_get" });
      if (res.ok) {
        fillSelect("relationalType", res.options.relationalTypes);
        fillSelect("kpi", res.options.kpis);
        document.getElementById("edit-relTypes").value = res.options.relationalTypes.join("\n");
        document.getElementById("edit-kpis").value = res.options.kpis.join("\n");
      }
    }

    function fillSelect(id, list) {
      const el = document.getElementById(id);
      el.innerHTML = '<option value="" disabled selected>Select...</option>';
      list.forEach(i => { const o = document.createElement("option"); o.value = o.textContent = i; el.appendChild(o); });
    }

    async function loadLogs() {
      const res = await apiCall({ action: "list" });
      const list = document.getElementById("logList");
      list.innerHTML = res.ok ? res.data.map(log => `
        <div class="p-4 border rounded bg-white flex justify-between items-center shadow-sm">
          <div>
            <div class="text-[10px] font-bold text-stone-400 uppercase">${log.date}</div>
            <div class="text-sm font-bold text-stone-800">${log.target || 'General'}</div>
            <div class="text-xs text-stone-500">${log.relationalType} • ${log.kpi} • ${log.hours}h</div>
          </div>
          ${userRole === 'admin' ? `<button onclick='startEdit(${JSON.stringify(log).replace(/'/g, "&apos;")})' class="text-blue-600 text-[10px] font-bold tracking-widest">EDIT</button>` : ''}
        </div>
      `).join('') : "";
    }

    function startEdit(log) {
      document.getElementById("edit-id").value = log.id;
      document.getElementById("date").value = log.date;
      document.getElementById("relationalType").value = log.relationalType;
      document.getElementById("target").value = log.target;
      document.getElementById("kpi").value = log.kpi;
      document.getElementById("hours").value = log.hours;
      document.getElementById("attendance").value = log.attendance || "";
      document.getElementById("impact").value = log.impact;
      document.getElementById("notes").value = log.notes;
      document.getElementById("logForm").classList.add("edit-mode");
      document.getElementById("save-btn").innerText = "Update Engagement";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById("logForm").onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById("edit-id").value;
      const data = {
        id: id || Date.now().toString(),
        date: document.getElementById("date").value,
        relationalType: document.getElementById("relationalType").value,
        target: document.getElementById("target").value,
        kpi: document.getElementById("kpi").value,
        hours: document.getElementById("hours").value,
        attendance: document.getElementById("attendance").value,
        impact: document.getElementById("impact").value,
        notes: document.getElementById("notes").value
      };
      const res = await apiCall({ action: id ? "edit" : "add", data: data });
      if (res.ok) {
        document.getElementById("logForm").reset();
        document.getElementById("edit-id").value = "";
        document.getElementById("logForm").classList.remove("edit-mode");
        document.getElementById("save-btn").innerText = "Save Engagement";
        loadLogs();
      }
    };

    async function saveDropdownSettings() {
      const options = {
        relationalTypes: document.getElementById("edit-relTypes").value.split("\n").filter(s => s.trim()),
        kpis: document.getElementById("edit-kpis").value.split("\n").filter(s => s.trim())
      };
      const res = await apiCall({ action: "dropdowns_set", options: options });
      if (res.ok) { alert("Dropdowns updated!"); refreshDropdowns(); }
    }

    async function loadAdminData() {
      const res = await apiCall({ action: "admin_get" });
      document.getElementById("admin-csv").value = Object.keys(res.admins).join(",");
      document.getElementById("viewer-csv").value = Object.keys(res.viewers).join(",");
    }

    async function saveAdminSettings() {
      const admins = {}; document.getElementById("admin-csv").value.split(",").forEach(e => { if(e.trim()) admins[e.trim().toLowerCase()] = true; });
      const viewers = {}; document.getElementById("viewer-csv").value.split(",").forEach(e => { if(e.trim()) viewers[e.trim().toLowerCase()] = true; });
      const res = await apiCall({ action: "admin_set", admins, viewers });
      if (res.ok) alert("Permissions saved!");
    }
  </script>
</body>
</html>

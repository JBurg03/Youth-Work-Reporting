<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youth Work Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #f5f5f4; padding-bottom: 140px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #15803d; cursor: pointer; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.1); margin-top: -6px; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e7e5e4; border-radius: 3px; }
    .syncing { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .edit-mode { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
  </style>
</head>
<body class="p-4 md:p-8 font-sans text-stone-900">

  <div class="max-w-6xl mx-auto">
    <header class="mb-8 border-b border-stone-300 pb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Impact Tracker</h1>
        <p id="status" class="text-stone-500 text-[10px] font-black uppercase tracking-widest mt-1">● Master Sheet Only Mode</p>
      </div>
      <button onclick="fullSync()"
        class="bg-blue-600 text-white text-[10px] font-black px-6 py-3 rounded-xl hover:bg-blue-700 transition uppercase tracking-widest shadow-lg active:scale-95">
        Refresh Data
      </button>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div id="formContainer" class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border-t-4 border-green-700 h-fit transition-all duration-300">
        <h2 id="formTitle" class="text-xl font-bold mb-4 tracking-tight text-center">New Engagement</h2>

        <form id="logForm" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[9px] font-black uppercase text-stone-400">Date</label>
              <input type="date" id="date" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50">
            </div>
            <div>
              <label class="block text-[9px] font-black uppercase text-stone-400 text-right">Hours</label>
              <input type="number" id="hours" step="0.5" min="0" placeholder="1.0" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50 text-right">
            </div>
          </div>

          <div>
            <label class="block text-[9px] font-black uppercase text-stone-400">Relational Type</label>
            <select id="relationalType" required class="w-full p-2 rounded-lg mt-1 text-sm bg-stone-50 border cursor-pointer">
              <option value="" disabled selected>Select Type...</option>
              <option value="One-on-One">One-on-One</option>
              <option value="Group Session">Group Session</option>
              <option value="Event/Bush Work">Event/Bush Work</option>
              <option value="Prep & Admin">Prep & Admin</option>
            </select>
          </div>

          <div class="grid grid-cols-3 gap-4">
            <div class="col-span-1">
              <label class="block text-[9px] font-black uppercase text-stone-400">Attend.</label>
              <input type="number" id="attendance" min="1" value="1" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50">
            </div>
            <div class="col-span-2">
              <label class="block text-[9px] font-black uppercase text-stone-400">Location</label>
              <input type="text" id="target" placeholder="e.g. Riccarton Hub" required class="w-full p-2 border rounded-lg mt-1 text-sm bg-stone-50">
            </div>
          </div>

          <div>
            <label class="block text-[9px] font-black uppercase text-stone-400">KPI Outcome</label>
            <select id="kpi" required class="w-full p-2 rounded-lg mt-1 text-sm bg-stone-50 border cursor-pointer">
              <option value="" disabled selected>Select KPI...</option>
              <option value="Rapport Building">Rapport Building</option>
              <option value="Mentoring">Mentoring</option>
              <option value="Crisis Support">Crisis Support</option>
              <option value="Skills Building">Skills Building</option>
              <option value="Community Engagement">Community Engagement</option>
            </select>
          </div>

          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-[9px] font-black uppercase text-stone-400">Impact Intensity</label>
              <span id="impactBadge" class="text-[9px] font-bold px-2 py-0.5 rounded bg-green-100 text-green-800 uppercase">Lvl 0</span>
            </div>
            <input type="range" id="impact" min="0" max="5" value="0" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-green-700">
          </div>

          <textarea id="notes" placeholder="Detailed notes..." class="w-full p-2 border rounded-lg mt-1 h-20 text-sm bg-stone-50"></textarea>

          <button type="submit" id="submitBtn" class="w-full bg-stone-900 text-white font-bold py-4 rounded-xl shadow-md hover:bg-black transition uppercase tracking-widest text-[10px]">Send to Sheet</button>
          <button type="button" id="cancelEdit" onclick="resetToNew()" class="hidden w-full text-stone-400 font-bold py-2 uppercase text-[9px] tracking-widest mt-2 hover:text-stone-600">Cancel Edit</button>
        </form>
      </div>

      <div class="lg:col-span-2 space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-green-600 text-center">
            <p class="text-stone-400 text-[10px] font-black uppercase tracking-tighter">Total Hours</p>
            <p id="totalHours" class="text-3xl font-black">0</p>
          </div>
          <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-red-600 text-center">
            <p class="text-stone-400 text-[10px] font-black uppercase tracking-tighter">High Impact</p>
            <p id="totalHighImpact" class="text-3xl font-black">0</p>
          </div>
          <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500 text-center">
            <p class="text-stone-400 text-[10px] font-black uppercase tracking-tighter">Log Count</p>
            <p id="totalLogs" class="text-3xl font-black">0</p>
          </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm">
          <h2 class="text-xs font-black uppercase text-stone-400 tracking-widest mb-4">Engagement History</h2>
          <div id="logList" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
            <p class="text-stone-400 italic text-sm text-center py-20">Refreshing Master Sheet...</p>
          </div>
        </div>
      </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
      <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="text-center md:text-left">
          <h2 class="text-[9px] font-black uppercase text-stone-400 tracking-widest mb-1 leading-none">Term Progress</h2>
          <p class="text-lg font-black leading-none"><span id="displayPercent">0</span>% <span class="text-[10px] font-normal text-stone-400 italic">of 100h</span></p>
        </div>
        <div class="flex-1 w-full md:max-w-xl px-2">
          <div class="w-full bg-stone-100 h-3 rounded-full overflow-hidden border border-stone-200">
            <div id="progressBar" class="bg-green-600 h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
          </div>
        </div>
        <p class="text-xs font-bold text-green-800 bg-green-50 px-3 py-1 rounded-full border border-green-100" id="hoursRemainingText">100 hours left</p>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwafaQ-uXCCNDITE6mdFAZIcjOBy_7OAOpHHdzmqo7Npiet8T_twPjztY8aKouhWEdrBw/exec";
    const TERM_GOAL = 100;

    let logs = [];
    let editingId = null;

    function generateId() {
      return 'ID-' + Math.random().toString(36).slice(2, 11) + Date.now();
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeDateForInput(dateVal) {
      const s = String(dateVal ?? "").trim();
      if (!s) return "";

      // If already YYYY-MM-DD, keep stable (avoid timezone shifting)
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

      const d = new Date(s);
      if (isNaN(d.getTime())) return "";

      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function setStatus(text, colorClass, syncing = false) {
      const status = document.getElementById('status');
      status.innerText = text;
      status.className = colorClass + ' text-[10px] font-black uppercase tracking-widest mt-1' + (syncing ? ' syncing' : '');
    }

    function updateUI() {
      const totalHrs = logs.reduce((sum, log) => sum + parseFloat(log.hours || 0), 0);
      const highImpactCount = logs.filter(log => parseInt(log.impact, 10) >= 4).length;
      const progressPercent = Math.min((totalHrs / TERM_GOAL) * 100, 100);

      document.getElementById('totalHours').innerText = totalHrs.toFixed(1);
      document.getElementById('totalHighImpact').innerText = String(highImpactCount);
      document.getElementById('totalLogs').innerText = String(logs.length);
      document.getElementById('displayPercent').innerText = progressPercent.toFixed(0);
      document.getElementById('progressBar').style.width = `${progressPercent}%`;

      const remaining = TERM_GOAL - totalHrs;
      document.getElementById('hoursRemainingText').innerText =
        remaining > 0 ? `${remaining.toFixed(1)}h left` : "Goal Hit! 🏆";

      const list = document.getElementById('logList');
      if (!logs.length) {
        list.innerHTML = '<p class="text-stone-400 italic text-sm text-center py-20">No history found on Google Sheet.</p>';
        return;
      }

      const sorted = [...logs].sort((a, b) => {
        const ad = normalizeDateForInput(a.date);
        const bd = normalizeDateForInput(b.date);
        return new Date(bd + "T00:00:00") - new Date(ad + "T00:00:00");
      });

      list.innerHTML = sorted.map((log) => {
        const impact = parseInt(log.impact, 10);
        const impactBadgeClass = impact >= 4 ? 'bg-red-600 text-white' : 'bg-stone-200 text-stone-700';

        const dateStr = normalizeDateForInput(log.date);
        const notes = (log.notes ?? "").toString();

        return `
          <div class="p-4 rounded-xl bg-stone-50 border border-stone-200 shadow-sm relative group">
            <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <button onclick="startEdit('${escapeHtml(log.id)}')" class="text-[9px] font-black text-blue-500 uppercase bg-white px-2 py-1 rounded border shadow-sm">Edit</button>
              <button onclick="deleteRow('${escapeHtml(log.id)}')" class="text-[9px] font-black text-red-500 uppercase bg-white px-2 py-1 rounded border shadow-sm">Del</button>
            </div>

            <div class="flex justify-between items-start mb-2 gap-3">
              <div class="flex flex-col">
                <span class="text-[10px] font-black text-stone-400 uppercase tracking-tighter">${escapeHtml(dateStr)}</span>
                <h4 class="font-bold text-stone-800 text-sm">${escapeHtml(log.kpi)}</h4>
              </div>
              <span class="text-[9px] font-black px-2 py-1 rounded-full ${impactBadgeClass}">LVL ${escapeHtml(impact)}</span>
            </div>

            <div class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2 text-[9px] font-bold uppercase">
              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">ID:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.id)}</span>
              </div>

              <div class="text-stone-500 flex gap-2 items-center justify-start">
                <span class="text-stone-400 font-black">Relational:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.relationalType)}</span>
              </div>

              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">Attendance:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.attendance)} people</span>
              </div>

              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">Location:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.target)}</span>
              </div>

              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">Hours:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.hours)}h</span>
              </div>

              <div class="text-stone-500 flex gap-2 items-center">
                <span class="text-stone-400 font-black">KPI:</span>
                <span class="font-bold text-stone-700 normal-case">${escapeHtml(log.kpi)}</span>
              </div>
            </div>

            <p class="text-xs text-stone-600 mt-3 italic leading-relaxed">Notes: "${escapeHtml(notes || "No notes.")}"</p>
          </div>
        `;
      }).join('');
    }

    async function postToSheet(payload) {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      const text = await res.text().catch(() => "");
      if (!res.ok) throw new Error(text || `HTTP ${res.status}`);
      return text;
    }

    function setFormForEntry(entry) {
      document.getElementById('date').value = normalizeDateForInput(entry.date);
      document.getElementById('hours').value = entry.hours ?? "";
      document.getElementById('relationalType').value = entry.relationalType ?? "";
      document.getElementById('attendance').value = entry.attendance ?? 1;
      document.getElementById('target').value = entry.target ?? "";
      document.getElementById('kpi').value = entry.kpi ?? "";
      document.getElementById('impact').value = entry.impact ?? 0;
      document.getElementById('impactBadge').innerText = `Lvl ${entry.impact ?? 0}`;
      document.getElementById('notes').value = entry.notes ?? "";
    }

    function startEdit(id) {
      const entry = logs.find(l => String(l.id) === String(id));
      if (!entry) return;

      editingId = id;
      setFormForEntry(entry);

      document.getElementById('formTitle').innerText = "Edit Entry";
      document.getElementById('formContainer').classList.add('edit-mode');

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.innerText = "Apply Edit";
      submitBtn.classList.remove('bg-stone-900');
      submitBtn.classList.add('bg-blue-600');

      document.getElementById('cancelEdit').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetToNew() {
      editingId = null;
      document.getElementById('logForm').reset();

      document.getElementById('formTitle').innerText = "New Engagement";
      document.getElementById('formContainer').classList.remove('edit-mode');

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.innerText = "Send to Sheet";
      submitBtn.classList.remove('bg-blue-600');
      submitBtn.classList.add('bg-stone-900');

      document.getElementById('cancelEdit').classList.add('hidden');
      document.getElementById('impactBadge').innerText = 'Lvl 0';
    }

    document.getElementById('impact').addEventListener('input', (e) => {
      document.getElementById('impactBadge').innerText = `Lvl ${e.target.value}`;
    });

    async function deleteRow(id) {
      if (!confirm("Delete this from Google Sheet?")) return;

      setStatus("● Deleting From Sheet...", "text-red-600", true);
      await postToSheet({ action: "delete", id: id });
      await fullSync();
      resetToNew();
    }

    document.getElementById('logForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const entry = {
        date: document.getElementById('date').value,
        hours: document.getElementById('hours').value,
        relationalType: document.getElementById('relationalType').value,
        attendance: document.getElementById('attendance').value,
        target: document.getElementById('target').value,
        kpi: document.getElementById('kpi').value,
        impact: document.getElementById('impact').value,
        notes: document.getElementById('notes').value,
        id: editingId || generateId()
      };

      try {
        setStatus(editingId ? "● Updating Sheet..." : "● Adding to Sheet...", "text-blue-600", true);

        const payload = editingId
          ? { action: "edit", newEntry: entry }
          : { action: "add", data: entry };

        await postToSheet(payload);

        resetToNew();
        await fullSync();
      } catch (err) {
        setStatus("● Save Failed", "text-red-600");
        alert(String(err?.message || err));
      }
    });

    async function fullSync() {
      setStatus("● Refreshing From Master Sheet...", "text-blue-600", true);
      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();

        logs = Array.isArray(data) ? data : [];
        updateUI();

        setStatus("● Up to Date", "text-green-600");
      } catch (err) {
        setStatus("● Connection Error", "text-red-600");
      }
    }

    fullSync();
  </script>
</body>
</html>

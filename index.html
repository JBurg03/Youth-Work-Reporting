<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth Work Impact & KPI Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f4; }
        .stat-card { @apply bg-white p-4 rounded-lg shadow-sm border-l-4; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-stone-300 pb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold text-stone-800">Impact & KPI Tracker</h1>
                <p class="text-stone-600 italic text-sm">Quantifying Youth Work Value for Term Reporting</p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportToCSV()" class="bg-stone-800 text-white text-xs font-bold px-4 py-2 rounded hover:bg-stone-700">
                    Export Term Report (CSV)
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border-t-4 border-green-700 h-fit">
                <h2 class="text-xl font-bold mb-4 text-stone-800">Log Engagement</h2>
                <form id="logForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-stone-500">Date</label>
                            <input type="date" id="date" required class="w-full p-2 border rounded mt-1 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase text-stone-500">Duration (Hrs)</label>
                            <input type="number" id="hours" step="0.5" placeholder="1.5" required class="w-full p-2 border rounded mt-1 text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase text-stone-500">Principal-Facing Outcome</label>
                        <select id="kpi" class="w-full p-2 border rounded mt-1 text-sm font-medium bg-stone-50">
                            <option value="Attendance Support">Attendance Support (Return to School)</option>
                            <option value="Conflict Resolution">Conflict Resolution (Incident Prevention)</option>
                            <option value="Vocational/Skill Building">Vocational/Skill Building (Bush/Trade)</option>
                            <option value="Mental Health/Wellbeing">Mental Health & Wellbeing Support</option>
                            <option value="Crisis Intervention">Immediate Crisis Intervention</option>
                            <option value="Community Engagement">Community/Family Connection</option>
                        </select>
                        <p class="text-[10px] text-stone-400 mt-1 italic">Select the "Why" behind the session for reporting.</p>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase text-stone-500">Impact Intensity</label>
                        <select id="impact" class="w-full p-2 border rounded mt-1 text-sm">
                            <option value="1">Lvl 1: Rapport / Maintenance</option>
                            <option value="2">Lvl 2: Moderate Progress</option>
                            <option value="3">Lvl 3: Major Breakthrough / Intervention</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black uppercase text-stone-500">Evidence Notes (Confidential)</label>
                        <textarea id="notes" class="w-full p-2 border rounded mt-1 h-20 text-sm" placeholder="e.g. De-escalated potential fight at lunch; Student returned to class."></textarea>
                    </div>

                    <button type="submit" class="w-full bg-green-700 text-white font-bold py-3 rounded hover:bg-green-800 transition shadow-lg">Log Impact</button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="stat-card border-green-600">
                        <p class="text-stone-500 text-[10px] font-black uppercase">Total Term Hours</p>
                        <p id="totalHours" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                    <div class="stat-card border-orange-500">
                        <p class="text-stone-500 text-[10px] font-black uppercase">High-Value Interventions</p>
                        <p id="totalHighImpact" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                    <div class="stat-card border-blue-500">
                        <p class="text-stone-500 text-[10px] font-black uppercase">KPI Outcomes Logged</p>
                        <p id="totalLogs" class="text-3xl font-black text-stone-800">0</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm min-h-[400px]">
                    <h2 class="text-lg font-bold mb-4 text-stone-800 border-b pb-2">Recent Engagement Log</h2>
                    <div id="logList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('youthImpactLogs')) || [];

        function updateUI() {
            localStorage.setItem('youthImpactLogs', JSON.stringify(logs));

            // Summary Stats
            const totalHours = logs.reduce((sum, log) => sum + parseFloat(log.hours), 0);
            const highImpact = logs.filter(log => log.impact === "3").length;
            
            document.getElementById('totalHours').innerText = totalHours;
            document.getElementById('totalHighImpact').innerText = highImpact;
            document.getElementById('totalLogs').innerText = logs.length;

            const list = document.getElementById('logList');
            if (logs.length === 0) {
                list.innerHTML = '<p class="text-stone-400 italic text-sm py-10 text-center">No logs recorded. Use the form to begin tracking impact.</p>';
                return;
            }

            list.innerHTML = logs.map((log, index) => `
                <div class="flex gap-4 p-3 rounded-lg hover:bg-stone-50 transition border-b border-stone-50 last:border-0">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-green-900 text-sm">${log.kpi}</h4>
                            <span class="text-[9px] font-black px-2 py-1 rounded ${log.impact === '3' ? 'bg-orange-600 text-white' : 'bg-stone-200 text-stone-600'}">LVL ${log.impact}</span>
                        </div>
                        <div class="text-[10px] font-bold text-stone-500 mt-0.5">${log.date} • ${log.hours} Hours Logged</div>
                        <p class="text-xs text-stone-700 mt-2 bg-white p-2 rounded border border-stone-100 italic">"${log.notes || 'No detailed notes provided.'}"</p>
                        <button onclick="deleteLog(${index})" class="text-[9px] text-red-400 mt-2 hover:text-red-600 font-bold uppercase tracking-tighter">Delete Entry</button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('logForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const log = {
                date: document.getElementById('date').value,
                hours: document.getElementById('hours').value,
                kpi: document.getElementById('kpi').value,
                impact: document.getElementById('impact').value,
                notes: document.getElementById('notes').value
            };
            logs.unshift(log);
            document.getElementById('logForm').reset();
            updateUI();
        });

        function deleteLog(index) {
            if(confirm("Delete this entry?")) {
                logs.splice(index, 1);
                updateUI();
            }
        }

        function exportToCSV() {
            if (logs.length === 0) return alert("No data to export!");
            let csv = "data:text/csv;charset=utf-8,Date,KPI Outcome,Hours,Impact Level,Evidence Notes\n";
            logs.forEach(l => {
                csv += `"${l.date}","${l.kpi}","${l.hours}","Level ${l.impact}","${l.notes.replace(/"/g, '""')}"\n`;
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csv));
            link.setAttribute("download", `Youth_Work_Report_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        updateUI();
    </script>
</body>
</html>
